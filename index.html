<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Նկարիկ AI - Ընտրեք տարիքը</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .emoji {
            font-size: 48px;
        }
        .title {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--arm-blue);
        }
        .age {
            font-size: 0.9rem;
            color: #666;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .desc {
            font-size: 0.85rem;
            color: #888;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
            color: var(--arm-red);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Նկարիկ AI</h1>
            <p>Ընտրեք ձեր տարիքային խումբը</p>
        </div>

        <div class="grid">
            <div class="card" onclick="selectModule('kid')">
                <span class="emoji">🧸</span>
                <span class="title">ՓՈՔRԻK (Toddler)</span>
                <span class="age">1–4 տարեկան</span>
                <span class="desc">Պարզ ձևեր և գույներ</span>
            </div>
            <div class="card" onclick="selectModule('junior')">
                <span class="emoji">🎨</span>
                <span class="title">ՄEԾIK (Young)</span>
                <span class="age">5–7 տարեկան</span>
                <span class="desc">Ուրվագծում + 3 լեզու</span>
            </div>
            <div class="card" onclick="selectModule('school')">
                <span class="emoji">🤖</span>
                <span class="title">DPROCAKAN (School)</span>
                <span class="age">8–17 տարեկան</span>
                <span class="desc">AI պատկերացում</span>
            </div>
            <div class="card" onclick="selectModule('pro')">
                <span class="emoji">🎓</span>
                <span class="title">PRO (Professional)</span>
                <span class="age">18+ տարեկան</span>
                <span class="desc">AI ստուդիա</span>
            </div>
        </div>
    </div>

    <script>
        function selectModule(id) {
            localStorage.setItem('nkarik_last_module', id);
            window.location.href = `nkarik_${id}.html`;
        }

        window.onload = () => {
            const last = localStorage.getItem('nkarik_last_module');
            if (last && window.location.search !== '?no-redirect') {
                selectModule(last);
            }
        }
    </script>
</body>
</html>

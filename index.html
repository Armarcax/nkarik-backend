<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Նկարիկ 🇦🇲 - Հայկական արվեստ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --arm-red: #D90012;
            --arm-blue: #0033A0;
            --arm-orange: #F2A800;
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(217,0,18,0.1), rgba(0,51,160,0.15), rgba(242,168,0,0.1));
            color: #333;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body.dark {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #eee;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 1.4rem;
        }
        .colors {
            display: flex;
            gap: 4px;
        }
        .colors span {
            width: 24px;
            height: 12px;
            border-radius: 6px;
        }
        .theme-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin: 5px 0;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 15px;
            opacity: 0.8;
        }
        .canvas-wrapper {
            background: white;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            background: #fff;
            background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                              linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                              linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            touch-action: none;
            cursor: crosshair;
        }
        .controls {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .style-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 16px;
            padding: 10px 5px;
            color: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            border: 2px solid transparent;
        }
        .style-btn.active {
            background: linear-gradient(135deg, var(--arm-red), var(--arm-blue));
            color: white;
            border-color: var(--arm-orange);
            transform: scale(1.02);
        }
        .tools {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .color-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .tool-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            color: inherit;
        }
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--arm-red), var(--arm-blue));
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: 0 8px 20px rgba(217,0,18,0.3);
            cursor: pointer;
            margin-bottom: 15px;
        }
        .result-section {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }
        body.dark .result-section {
            background: #2a2a3e;
        }
        .result-img {
            max-width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px solid var(--arm-orange);
        }
        .loading {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid transparent;
            border-top-color: var(--arm-red);
            border-radius: 50%;
            animation: spin 1s infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: rgba(217,0,18,0.2);
            color: var(--arm-red);
            padding: 10px;
            border-radius: 30px;
            margin: 10px 0;
            display: none;
        }
        #status {
            text-align: center;
            margin: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="logo">
            <span>🇦🇲</span>
            <div class="colors">
                <span style="background:#D90012"></span>
                <span style="background:#0033A0"></span>
                <span style="background:#F2A800"></span>
            </div>
        </div>
        <button class="theme-btn" id="themeToggle">🌙</button>
    </div>

    <h1>🎨 Նկարիկ</h1>
    <div class="subtitle">Նկարիր, և AI-ը կկենդանացնի</div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <div class="style-grid" id="styleGrid"></div>
        <div class="tools">
            <div id="colorPalette" style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;"></div>
            <button class="tool-btn" id="clearBtn">🗑️ Մաքրել</button>
            <button class="tool-btn" id="undoBtn">↩️ Հետ</button>
        </div>
    </div>

    <button class="generate-btn" id="generateBtn">✨ Կենդանացնել</button>

    <div class="error" id="errorMsg"></div>
    <div id="status">Սպասում ենք...</div>

    <div class="result-section" id="resultSection" style="display: none;">
        <h3 style="margin-bottom: 12px;">🎉 Պատրաստ է!</h3>
        <img id="resultImg" class="result-img" alt="Generated artwork">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="tool-btn" id="downloadBtn">⬇️ Պահպանել</button>
            <button class="tool-btn" id="newBtn">🎨 Նոր նկար</button>
        </div>
    </div>
</div>

<div class="loading" id="loadingOverlay">
    <div class="spinner"></div>
    <p style="color:white;">🎨 AI-ն ստեղծում է...</p>
    <p style="color:#aaa; font-size:0.8rem;">Մոտ 20-30 վայրկյան</p>
</div>

<script>
    (function(){
        "use strict";

        // ---------- CONFIGURATION ----------
        const API_URL = 'https://nkarik-backend-2.onrender.com';

        // DOM elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('errorMsg');
        const resultSection = document.getElementById('resultSection');
        const resultImg = document.getElementById('resultImg');
        const loading = document.getElementById('loadingOverlay');
        const generateBtn = document.getElementById('generateBtn');

        // State
        let isDrawing = false;
        let currentColor = '#000000';
        let currentStyle = 'cartoon';
        let history = [];
        let historyStep = -1;

        // Styles list (6)
        const STYLES = [
            { id: 'cartoon', icon: '🎨', name: 'Կարթուն' },
            { id: '3d', icon: '🎬', name: '3D' },
            { id: 'watercolor', icon: '🌊', name: 'Ջրաներկ' },
            { id: 'comic', icon: '💥', name: 'Ծաղրանկար' },
            { id: 'abstract', icon: '🎭', name: 'Աբստրակտ' },
            { id: 'animation', icon: '✨', name: 'Անիմացիա' }
        ];
        const COLORS = ['#000000', '#D90012', '#0033A0', '#F2A800', '#00ff00', '#ff00ff'];

        // Init canvas
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 4;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();

        // Build UI
        function buildStyleButtons() {
            const grid = document.getElementById('styleGrid');
            grid.innerHTML = '';
            STYLES.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `style-btn ${s.id === currentStyle ? 'active' : ''}`;
                btn.dataset.style = s.id;
                btn.innerHTML = `<span>${s.icon}</span><span>${s.name}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentStyle = s.id;
                };
                grid.appendChild(btn);
            });
        }
        function buildColorPalette() {
            const palette = document.getElementById('colorPalette');
            palette.innerHTML = '';
            COLORS.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = c;
                btn.dataset.color = c;
                if (c === currentColor) btn.style.boxShadow = '0 0 0 3px #F2A800';
                btn.onclick = () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.style.boxShadow = 'none');
                    btn.style.boxShadow = '0 0 0 3px #F2A800';
                    currentColor = c;
                    ctx.strokeStyle = c;
                };
                palette.appendChild(btn);
            });
        }
        buildStyleButtons();
        buildColorPalette();
        ctx.strokeStyle = currentColor;

        // Drawing functions
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getCanvasCoords(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }
        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                ctx.beginPath();
                saveState();
            }
        }
        function saveState() {
            historyStep++;
            if (historyStep < history.length) history.length = historyStep;
            history.push(canvas.toDataURL());
        }
        function undo() {
            if (historyStep > 0) {
                historyStep--;
                const img = new Image();
                img.src = history[historyStep];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        }
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
            hideResult();
        }

        // Event listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        document.getElementById('clearBtn').onclick = clearCanvas;
        document.getElementById('undoBtn').onclick = undo;

        // Theme toggle
        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('dark');
            const btn = document.getElementById('themeToggle');
            btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        };

        // Helper: check if canvas is empty
        function isCanvasBlank() {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] < 250 || data[i+1] < 250 || data[i+2] < 250) return false;
            }
            return true;
        }

        function showError(msg) {
            errorDiv.textContent = '❌ ' + msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 4000);
        }

        function hideResult() {
            resultSection.style.display = 'none';
        }

        // Check backend health
        async function checkBackend() {
            try {
                const res = await fetch(`${API_URL}/health`);
                if (res.ok) {
                    statusDiv.textContent = '✅ Backend-ը միացված է';
                    statusDiv.style.color = '#2e7d32';
                    return true;
                }
            } catch(e) {}
            statusDiv.textContent = '⚠️ Backend անհասանելի';
            statusDiv.style.color = '#D90012';
            return false;
        }

        // Generate
        async function generate() {
            if (isCanvasBlank()) {
                showError('Նախ նկարիր ինչ-որ բան!');
                return;
            }
            if (!(await checkBackend())) {
                showError('Backend-ը հասանելի չէ: Փորձիր ավելի ուշ:');
                return;
            }

            generateBtn.disabled = true;
            loading.style.display = 'flex';
            errorDiv.style.display = 'none';
            hideResult();
            statusDiv.style.color = ''; // reset

            try {
                const imageData = canvas.toDataURL('image/png');
                const res = await fetch(`${API_URL}/generate`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        image: imageData,
                        style: currentStyle,
                        strength: 0.7
                    })
                });
                if (!res.ok) throw new Error(`Սխալ ${res.status}`);
                const data = await res.json();
                resultImg.src = data.result;
                resultSection.style.display = 'block';

                // Ցույց տանք, եթե fallback է
                if (data.note === 'fallback') {
                    statusDiv.textContent = '⚠️ Fallback: ' + (data.error_details || 'անհայտ սխալ');
                    statusDiv.style.color = '#D90012';
                } else {
                    statusDiv.textContent = '✅ AI-ը պատրաստ է';
                    statusDiv.style.color = '#2e7d32';
                }

                resultSection.scrollIntoView({behavior: 'smooth'});
            } catch(err) {
                showError('Գեներացիան ձախողվեց: ' + err.message);
            } finally {
                generateBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        generateBtn.onclick = generate;

        document.getElementById('downloadBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `nkarik-${currentStyle}.png`;
            link.href = resultImg.src;
            link.click();
        };
        document.getElementById('newBtn').onclick = () => {
            resultSection.style.display = 'none';
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        // Initial check
        checkBackend();
        setInterval(checkBackend, 10000);
    })();
</script>
</body>
</html>

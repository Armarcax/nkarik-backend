<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Նկարիկ AI - Ընտրեք տարիքը</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(108, 92, 231, 0.15);
            border-color: rgba(108, 92, 231, 0.3);
        }
        .emoji { font-size: 60px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .title { font-weight: 900; font-size: 1.4rem; color: #1a1a2e; }
        .age {
            font-size: 0.9rem; font-weight: 800;
            color: white; background: var(--primary-gradient);
            padding: 6px 16px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.2);
        }
        .desc { font-size: 0.9rem; color: #666; font-weight: 600; }

        .header { text-align: center; margin-top: 40px; }
        h1 {
            font-size: 3rem; font-weight: 900;
            background: linear-gradient(135deg, #d90012, #0033a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p { font-weight: 700; color: #555; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Նկարիկ AI</h1>
            <p>Ընտրեք ձեր տարիքային խումբը</p>
        </div>

        <div class="grid">
            <div class="card" onclick="selectModule('kid')">
                <span class="emoji">🧸</span>
                <span class="title">ՓՈՔՐԻԿ</span>
                <span class="age">1–4 տարեկան</span>
                <span class="desc">Պարզ ձևեր և գույներ</span>
            </div>
            <div class="card" onclick="selectModule('junior')">
                <span class="emoji">🎨</span>
                <span class="title">ՄԵԾԻԿ</span>
                <span class="age">5–7 տարեկան</span>
                <span class="desc">Ուրվագծում + 3 լեզու</span>
            </div>
            <div class="card" onclick="selectModule('school')">
                <span class="emoji">🤖</span>
                <span class="title">ԴՊՐՈՑԱԿԱՆ</span>
                <span class="age">8–17 տարեկան</span>
                <span class="desc">AI պատկերացում</span>
            </div>
            <div class="card" onclick="selectModule('pro')">
                <span class="emoji">🎓</span>
                <span class="title">ՊՐՈ</span>
                <span class="age">18+ տարեկան</span>
                <span class="desc">AI 3D Ստուդիա</span>
            </div>
        </div>
    </div>

    <script>
        function selectModule(id) {
            localStorage.setItem('nkarik_last_module', id);
            window.location.href = `nkarik_${id}.html`;
        }

        window.onload = () => {
            const last = localStorage.getItem('nkarik_last_module');
            if (last && window.location.search !== '?no-redirect') {
                // For direct editing/preview, we can stay here if needed.
                // selectModule(last);
            }
        }
    </script>
</body>
</html>

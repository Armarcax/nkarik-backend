<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 Նկարիկ AI — Kid Studio</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }
        
        @keyframes rainbowBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 20%, #a1c4fd 40%, #c2e9fb 60%, #e0c3fc 80%, #ff9a9e 100%);
            background-size: 400% 400%;
            animation: rainbowBackground 20s ease infinite;
            color: #1D1D1F; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding: 12px; 
            padding-bottom: env(safe-area-inset-bottom, 24px);
            overflow-y: auto; 
        }

        /* Dark Mode Global Overrides */
        body.dark-mode {
            background: linear-gradient(135deg, #111424 0%, #1c1421 30%, #0f1b29 60%, #111424 100%);
            animation: none;
            color: #F5F5F7;
        }
        body.dark-mode .app-card {
            background: rgba(28, 28, 30, 0.94);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        body.dark-mode .accordion-section, 
        body.dark-mode .library-section,
        body.dark-mode .sliders-group,
        body.dark-mode .lang-selector-row,
        body.dark-mode .prompt-container,
        body.dark-mode .prompt-input-area,
        body.dark-mode .control-select,
        body.dark-mode .color-system-container {
            background: #2C2C2E;
            border-color: #3A3A3C;
            color: #F5F5F7;
        }
        body.dark-mode .accordion-header {
            background: #3A3A3C;
            color: #F5F5F7;
        }
        body.dark-mode .style-grid-item {
            background: #3A3A3C;
            color: #E5E5EA;
            border-color: #48484A;
        }
        body.dark-mode .style-grid-item.active {
            background: #1A3A5F;
            color: #0A84FF;
            border-color: #0A84FF;
        }
        body.dark-mode .toolbar-wrapper {
            background: #2C2C2E;
        }
        body.dark-mode .tool-btn,
        body.dark-mode .library-item {
            background: #3A3A3C;
            color: #F5F5F7;
        }
        body.dark-mode .hist-btn {
            background: #48484A;
            color: #F5F5F7;
        }
        body.dark-mode .canvas-area-wrapper {
            background: #1C1C1E;
        }
        body.dark-mode .mic-btn {
            background: #3A3A3C;
            color: #A2A2A7;
        }

        .app-card { 
            background: rgba(255, 255, 255, 0.96); 
            backdrop-filter: blur(20px);
            border-radius: 32px; 
            padding: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
            max-width: 480px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            margin-bottom: 20px; 
        }

        .top-menu-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        h1 { 
            font-size: 22px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #FF3B30, #FF9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .accordion-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .accordion-section {
            border: 1px solid #E5E5EA;
            border-radius: 16px;
            background: #FFFFFF;
            overflow: hidden;
        }

        .accordion-header {
            width: 100%;
            padding: 12px 14px;
            background: #F2F2F7;
            border: none;
            outline: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            color: #1D1D1F;
            cursor: pointer;
        }

        .accordion-header::after {
            content: '▼';
            font-size: 10px;
            color: #8E8E93;
        }

        .accordion-section.open .accordion-header::after {
            transform: rotate(180deg);
        }

        .accordion-content {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.25s ease-out;
            display: flex;
            flex-direction: column;
            background: #FFFFFF;
        }

        .accordion-section.open .accordion-content {
            max-height: 320px;
        }

        .style-grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px;
            background: #F2F2F7;
        }
        
        .style-grid-item {
            background: #FFFFFF;
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
        }
        .style-grid-item.active {
            border-color: #007AFF;
            background: #E8F2FF;
            color: #007AFF;
            font-weight: 700;
        }
        .style-grid-icon { font-size: 22px; }
        .style-grid-label { font-size: 11px; text-align: center; }

        .toolbar-wrapper {
            background: #F2F2F7;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tools-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }

        .tool-btn {
            flex: 1;
            padding: 8px 4px;
            border: none;
            border-radius: 12px;
            background: #FFFFFF;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: all 0.1s ease;
        }
        .tool-btn.active {
            background: #007AFF;
            color: #FFFFFF;
            transform: scale(1.02);
        }

        .sliders-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #FFFFFF;
            padding: 10px;
            border-radius: 14px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .canvas-area-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.04);
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: transparent;
        }
        .canvas-guide-overlay {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
            opacity: 0.25;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .canvas-guide-overlay svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .library-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #FFFFFF;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #E5E5EA;
        }
        .library-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .library-title {
            font-size: 13px;
            font-weight: 700;
            color: #48484A;
        }
        .library-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .library-item {
            flex: 0 0 65px;
            height: 65px;
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            background: #FFFFFF;
            cursor: pointer;
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .library-item.active {
            border-color: #007AFF;
            background: #E8F2FF;
        }
        .library-item svg {
            width: 70%;
            height: 70%;
            stroke: #3A3A3C;
            stroke-width: 4;
            fill: none;
        }
        body.dark-mode .library-item svg { stroke: #F5F5F7; }
        .library-item-label { font-size: 9px; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .color-system-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #FFFFFF;
            padding: 10px;
            border-radius: 18px;
        }
        .palette-row-kids {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .color-dot-kid {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #FFFFFF;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
        }
        .color-dot-kid.active {
            transform: scale(1.15);
            border-color: #007AFF;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4);
        }
        .rainbow-toggle-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 2px solid #E5E5EA;
            background: linear-gradient(45deg, #ff3b30, #ff9500, #4cd964, #5ac8fa, #5856d6);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .rainbow-toggle-btn.active {
            border-color: #007AFF;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .control-select {
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #E5E5EA;
            font-size: 12px;
            background: #FFFFFF;
            outline: none;
        }

        /* Container for Textarea and Mic Button */
        .prompt-container {
            position: relative;
            width: 100%;
            border-radius: 14px;
            border: 1px solid #E5E5EA;
            background: #FFFFFF;
            overflow: hidden;
        }

        .prompt-input-area {
            width: 100%;
            padding: 10px;
            padding-right: 46px; /* Space for microphone button */
            border: none;
            font-size: 14px;
            outline: none;
            resize: none;
            height: 55px;
            background: transparent;
        }

        .mic-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: #F2F2F7;
            color: #555555;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 5;
        }
        .mic-btn.listening {
            background: #FF3B30 !important;
            color: #FFFFFF !important;
            animation: pulseMic 1.2s infinite ease-in-out;
        }
        @keyframes pulseMic {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { transform: scale(1.08); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .engine-status-badge {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            background: #E8F2FF;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            color: #007AFF;
        }

        .action-grid {
            display: flex;
            gap: 10px;
        }
        .main-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-generate { background: linear-gradient(135deg, #34C759, #248A3D); }
        .btn-video { background: linear-gradient(135deg, #007AFF, #0051A8); }
        .main-btn:disabled { opacity: 0.5; }

        .result-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .output-media-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }
        .output-media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes dynamicVideoPan {
            0% { transform: scale(1.0); }
            50% { transform: scale(1.18) translate(-10px, -8px); }
            100% { transform: scale(1.0); }
        }
        .output-media-box img.animate-motion-active {
            animation: dynamicVideoPan 4.5s infinite ease-in-out;
        }

        .history-row {
            display: flex;
            gap: 8px;
        }
        .hist-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 10px;
            background: #E5E5EA;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .loading-view {
            display: none;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            color: #007AFF;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #E5E5EA;
            border-top-color: #007AFF;
            border-radius: 50%;
            margin: 0 auto 6px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .theme-toggle-btn {
            background: #E5E5EA;
            border: none;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }
        body.dark-mode .theme-toggle-btn {
            background: #3A3A3C;
            color: #FFFFFF;
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="top-menu-bar">
        <h1 id="appMainTitle">🎨 Նկարիկ AI</h1>
        <div style="display: flex; gap: 6px; align-items: center;">
            <select id="appLanguageSelect" class="control-select">
                <option value="hy" selected>🇦🇲 HY</option>
                <option value="en">🇺🇸 EN</option>
                <option value="ru">🇷🇺 RU</option>
            </select>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleDarkMode()">🌙 Mode</button>
        </div>
    </div>

    <div class="library-section">
        <div class="library-header-row">
            <span class="library-title" id="lblLibraryTitle">✨ Ուրվագծեր (Trace Templates)</span>
            <select id="templateCategorySelect" class="control-select" style="padding: 2px 4px; font-size: 11px;">
                <option value="all">🌟 Բոլորը</option>
                <option value="objects">🧸 Պատկերներ</option>
                <option value="numbers">🔢 Թվեր</option>
                <option value="hy_letters">🇦🇲 Տառեր (HY)</option>
                <option value="en_letters">🇺🇸 Letters (EN)</option>
                <option value="ru_letters">🇷🇺 Буквы (RU)</option>
                <option value="bird_letters">🦅 Թռչնատառ</option>
            </select>
        </div>
        <div class="library-scroll" id="templateLibraryContainer"></div>
    </div>

    <div class="engine-status-badge">
        <span>🤖 Shape Matrix:</span>
        <span id="engineStatusText">Waiting for strokes...</span>
    </div>

    <div class="canvas-area-wrapper" id="canvasWrapper">
        <div class="canvas-guide-overlay" id="canvasGuideOverlay"></div>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="toolbar-wrapper">
        <div class="tools-row">
            <button class="tool-btn active" id="tPencil" onclick="setTool('pencil')">✏️ <span id="txtPencil">Մատիտ</span></button>
            <button class="tool-btn" id="tBrush" onclick="setTool('brush')">🖌️ <span id="txtBrush">Վրձին</span></button>
            <button class="tool-btn" id="tPen" onclick="setTool('pen')">🖊️ <span id="txtPen">Գրիչ</span></button>
            <button class="tool-btn" id="tEraser" onclick="setTool('eraser')">🧼 <span id="txtEraser">Ռետին</span></button>
            <button class="tool-btn" style="color:#FF3B30;" onclick="clearCanvas()">🗑️ <span id="txtClear">Ջնջել</span></button>
        </div>

        <div class="sliders-group">
            <div class="slider-container">
                <span id="lblSize">Չափս:</span>
                <input type="range" id="brushSize" min="2" max="60" value="10">
                <span id="brushSizeVal">10px</span>
            </div>
            <div class="slider-container">
                <span id="lblOpacity">Թափանցիկություն:</span>
                <input type="range" id="brushOpacity" min="10" max="100" value="100">
                <span id="brushOpacityVal">100%</span>
            </div>
        </div>
    </div>

    <div class="color-system-container">
        <div class="palette-row-kids" id="paletteRowKids"></div>
    </div>

    <div class="accordion-container">
        <div class="accordion-section" id="styleAccordionSection">
            <button class="accordion-header" onclick="toggleAccordion()" id="lblStyleHeader">🎨 Ընտրել Նկարչության Ոճը</button>
            <div class="accordion-content">
                <div class="style-grid-container" id="styleGridSelector"></div>
            </div>
        </div>
    </div>

    <div class="prompt-container">
        <textarea class="prompt-input-area" id="promptInput" placeholder="Գրիր այստեղ կամ խոսիր միկրոֆոնով..."></textarea>
        <button id="micVoiceBtn" class="mic-btn" title="Ձայնային հրահանգ">🎙️</button>
    </div>

    <div class="action-grid">
        <button class="main-btn btn-generate" id="generateBtn">🚀 <span id="txtGenPic">Նկարել</span></button>
        <button class="main-btn btn-video" id="videoBtn">🎬 <span id="txtGenVid">Անիմացիա</span></button>
    </div>

    <div class="loading-view" id="loadingText">
        <div class="spinner"></div>
        <span id="lblProcessing">Մշակվում է...</span>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="output-media-box">
            <img id="resultImg" alt="AI Output Screen" />
        </div>
        <div class="history-row">
            <button class="hist-btn" style="background:#007AFF; color:#FFF;" id="downloadBtn">💾 Ներբեռնել</button>
            <button class="hist-btn" id="newBtn">✨ Նորը</button>
        </div>
    </div>
</div>

<script>
    (() => {
        const UI_STRINGS = {
            hy: {
                pencil: "Մատիտ", brush: "Վրձին", pen: "Գրիչ", eraser: "Ռետին", clear: "Ջնջել", processing: "Մշակվում է...",
                alertFail: "Հարցումը ձախողվեց: Խնդրում ենք փորձել կրկին:", voicePlaceholder: "Գրիր այստեղ կամ խոսիր միկրոֆոնով..."
            },
            en: {
                pencil: "Pencil", brush: "Brush", pen: "Pen", eraser: "Eraser", clear: "Clear", processing: "Processing...",
                alertFail: "Request failed. Please try again!", voicePlaceholder: "Type here or speak to mic..."
            },
            ru: {
                pencil: "Карандаш", brush: "Кисть", pen: "Ручка", eraser: "Ластик", clear: "Стереть", processing: "Магия...",
                alertFail: "Ошибка соединения. Попробуйте еще раз!", voicePlaceholder: "Пишите здесь или говорите в микрофон..."
            }
        };

        const DICTIONARY_MAP = {
            "խնձոր": "apple", "ձուկ": "fish", "ձկնիկ": "cute fish", "կատու": "cat", "շուն": "dog", "շունիկ": "puppy dog",
            "մեքենա": "car", "ավտո": "car", "տուն": "house", "տնակ": "cozy little house", "ծառ": "tree", "արև": "sun", 
            "ամպ": "cloud", "ամպիկ": "fluffy cloud", "թիթեռ": "butterfly", "ծաղիկ": "flower", "նապաստակ": "rabbit", 
            "արջուկ": "teddy bear", "գնդակ": "ball", "նավակ": "boat", "աստղ": "star", "լուսին": "moon", 
            "հեծանիվ": "bicycle", "աղվես": "fox", "առյուծ": "lion", "փիղ": "elephant", "ձի": "horse",

        function startPaint(e) {
            isDrawing = true;
            ctx.beginPath();
            const pos = getVectorCoords(e);
            ctx.moveTo(pos.x, pos.y);
            if (engineStatusText.innerText.includes("Waiting") || engineStatusText.innerText.includes("cleared")) {
                engineStatusText.innerText = "Capturing user sketch trajectories...";
            }
        }

        function drawPaint(e) {
            if (!isDrawing) return;
            const pos = getVectorCoords(e);
            
            ctx.lineTo(pos.x, pos.y);
            
            if (activeTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = brushSize * 1.5;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.lineWidth = brushSize;
                
                if (isRainbowMode) {
                    rainbowHue = (rainbowHue + 2) % 360;
                    ctx.strokeStyle = `hsl(${rainbowHue}, 95%, 55%)`;
                } else {
                    ctx.strokeStyle = currentColor;
                }
            }

            ctx.globalAlpha = brushOpacity / 100;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function stopPaint() {
            isDrawing = false;
            ctx.closePath();
        }

        function getVectorCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function transformPromptToEnglish(rawText) {
            if (!rawText) return "";
            let clean = rawText.toLowerCase().trim();
            if (DICTIONARY_MAP[clean]) {
                return DICTIONARY_MAP[clean];
            }
            return rawText;
        }

        // --- ՈՒՂՂՎԱԾ ԳԵՆԵՐԱՑՄԱՆ ՏՐԱՄԱԲԱՆՈՒԹՅՈՒՆԸ (FIXED processAI) ---
        async function processAI(isVideoMode = false) {
            if (isProcessingAI) return;
            const currentTime = Date.now();
            const timePassed = currentTime - lastGenerationTime;
            if (timePassed < GENERATION_COOLDOWN_MS) {
                const waitTime = GENERATION_COOLDOWN_MS - timePassed;
                setTimeout(() => processAI(isVideoMode), waitTime);
                return;
            }
            isProcessingAI = true;
            lastGenerationTime = Date.now();
            generateBtn.disabled = true;
            videoBtn.disabled = true;
            loadingText.style.display = 'block';

            let canvasDataUri = "";
            try {
                canvasDataUri = canvas.toDataURL("image/png");
            } catch(e) {
                canvasDataUri = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
            }

            const userRawText = promptInput.value.trim().replace(/["']/g, "");
            const optimizedEnglishPrompt = transformPromptToEnglish(userRawText);
            const styleObj = ART_STYLES.find(s => s.id === selectedStyle) || ART_STYLES[0];

            // --- ՔԱՅԼ 1: ՃՇԳՐԻՏ ՀԱՅՏՆԱԲԵՐՄԱՆ ՏՐԱՄԱԲԱՆՈՒԹՅՈՒՆ (DETECTION LOGIC) ---
            let detectedType = "free doodle"; // Նախնական լռելյայն տարբերակ
            let characterValue = "";

            if (activeTemplateId) {
                // Ստուգում ենք ընտրված ուրվագծի (template) կատեգորիան
                const tmpl = GUIDED_TEMPLATES.find(t => t.id === activeTemplateId);
                if (tmpl) {
                    if (tmpl.cat === "hy_letters" || tmpl.cat === "en_letters" || tmpl.cat === "ru_letters" || tmpl.cat === "bird_letters") {
                        detectedType = "letter";
                        characterValue = tmpl.id.split('_')[1] || tmpl.id;
                    } else if (tmpl.cat === "numbers") {
                        detectedType = "number";
                        characterValue = tmpl.id.split('_')[1] || tmpl.id;
                    } else if (tmpl.cat === "objects") {
                        detectedType = "object/shape";
                    }
                }
            } else if (userRawText) {
                // Եթե ուրվագիծ ընտրված չէ, վերլուծում ենք տեքստային դաշտը (1 նիշի դեպքում)
                if (userRawText.length === 1) {
                    const char = userRawText;
                    if (/[0-9]/.test(char)) {
                        detectedType = "number";
                        characterValue = char;
                    } else if (/[\s\w\d]/i.test(char) === false && !/[\u0531-\u0556\u0561-\u0587\u0400-\u04FF]/.test(char)) {
                        detectedType = "symbol";
                        characterValue = char;
                    } else {
                        detectedType = "letter";
                        characterValue = char;
                    }
                }
            }

            // Թարմացնում ենք կարգավիճակի վահանակը թափանցիկության համար
            engineStatusText.innerText = `Detected Matrix: [${detectedType.toUpperCase()}] processing...`;

            // --- ՔԱՅԼ 2: ՊՐՈՄՓԹԵՐԻ ԵՎ ՄՈԴԵՐԻ ԲԱԺԱՆՈՒՄ (PIPELINE ROUTING) ---
            let childFriendlyPrompt = "";

            // Ա. Տիպոգրաֆիկ/character մոդ (Միայն տառերի, թվերի և նշանների համար)
            if (detectedType === "letter" || detectedType === "number" || detectedType === "symbol") {
                if (activeTemplateId && activeTemplateId.startsWith("bird_")) {
                    childFriendlyPrompt = `medieval ornate Armenian bird-letter Trchnatar manuscript illuminating art style for the character [${characterValue}], ${styleObj.prompt}, detailed miniature calligraphy, zoomorphic animal illumination`;
                } else {
                    childFriendlyPrompt = `decorative stylized creative typography design art for the character [${characterValue}], beautiful ornate artistic visual rendering of letter or number, ${styleObj.prompt}`;
                }
            } 
            // Բ. Օրիգինալ բնականոն պատկերների/օբյեկտների մոդ (Ձկներ, կենդանիներ, իրեր, doodle, ազատ նկարներ)
            else {
                const baseType = activeTemplateId ? GUIDED_TEMPLATES.find(t => t.id === activeTemplateId)?.id : "whimsical illustration";
                
                if (optimizedEnglishPrompt) {
                    childFriendlyPrompt = `cute cheerful ${optimizedEnglishPrompt}, ${styleObj.prompt}, lovely happy child painting aesthetic`;
                } else {
                    childFriendlyPrompt = `friendly illustration of a ${baseType}, ${styleObj.prompt}, clear clean object depiction`;
                }
            }

            const encodedPrompt = encodeURIComponent(childFriendlyPrompt);
            const randomSeed = Math.floor(Math.random() * 9999999);
            const width = 512;
            const height = 512;
            let targetUrl = `https://image.pollinations.ai/p/${encodedPrompt}?width=${width}&height=${height}&seed=${randomSeed}&nofeed=true`;

            tryFetchImage(targetUrl, isVideoMode, childFriendlyPrompt, 1);
        }

        async function tryFetchImage(url, isVideoMode, promptString, attemptNumber) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("HTTP-error code: " + response.status);
                
                const blob = await response.blob();
                const localObjectURL = URL.createObjectURL(blob);
                
                renderAIFinalResult(localObjectURL, isVideoMode, promptString);
            } catch (err) {
                if (attemptNumber < 3) {
                    setTimeout(() => tryFetchImage(url, isVideoMode, promptString, attemptNumber + 1), 1000);
                } else {
                    alert(UI_STRINGS[currentLanguage].alertFail);
                    resetAILoadingState();
                }
            }
        }

        function renderAIFinalResult(mediaUrl, isVideo, promptUsed) {
            resetAILoadingState();
            resultPanel.style.display = "flex";
            resultImg.src = mediaUrl;
            
            if (isVideo) {
                resultImg.classList.add("animate-motion-active");
            } else {
                resultImg.classList.remove("animate-motion-active");
            }

            document.getElementById('downloadBtn').onclick = () => {
                const a = document.createElement('a');
                a.href = mediaUrl;
                a.download = `nkarik_ai_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            resultPanel.scrollIntoView({ behavior: 'smooth' });
        }

        function resetAILoadingState() {
            isProcessingAI = false;
            generateBtn.disabled = false;
            videoBtn.disabled = false;
            loadingText.style.display = 'none';
        }

        // Voice Recognition System (Single Mic Button Interface)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            document.getElementById('micVoiceBtn').onclick = () => {
                const btn = document.getElementById('micVoiceBtn');
                if (btn.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    let recLang = "hy-AM";
                    if (currentLanguage === "en") recLang = "en-US";
                    if (currentLanguage === "ru") recLang = "ru-RU";
                    recognition.lang = recLang;
                    recognition.start();
                }
            };

            recognition.onstart = () => {
                document.getElementById('micVoiceBtn').classList.add('listening');
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                promptInput.value = speechToText;
            };

            recognition.onerror = () => {
                document.getElementById('micVoiceBtn').classList.remove('listening');
            };

            recognition.onend = () => {
                document.getElementById('micVoiceBtn').classList.remove('listening');
            };
        } else {
            document.getElementById('micVoiceBtn').style.display = "none";
        }

        document.getElementById('newBtn').onclick = () => {
            resultPanel.style.display = "none";
            resultImg.src = "";
            clearCanvasSpace();
            promptInput.value = "";
            engineStatusText.innerText = "Ready for new drawing art cycles.";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        generateBtn.onclick = () => processAI(false);
        videoBtn.onclick = () => processAI(true);

        canvas.addEventListener('mousedown', startPaint);
        canvas.addEventListener('mousemove', drawPaint);
        canvas.addEventListener('mouseup', stopPaint);
        canvas.addEventListener('mouseout', stopPaint);

        canvas.addEventListener('touchstart', (e) => { startPaint(e); drawPaint(e); });
        canvas.addEventListener('touchmove', drawPaint);
        canvas.addEventListener('touchend', stopPaint);

        renderPalettes();
        renderVisualStyleGrid();
        renderGuidedTraceLibrary();
        
        brushSizeInput.oninput = (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('brushSizeVal').innerText = `${brushSize}px`;
        };
        brushOpacityInput.oninput = (e) => {
            brushOpacity = parseInt(e.target.value);
            document.getElementById('brushOpacityVal').innerText = `${brushOpacity}%`;
        };

        document.getElementById('appLanguageSelect').onchange = (e) => {
            currentLanguage = e.target.value;
            document.getElementById('lblProcessing').innerText = UI_STRINGS[currentLanguage].processing;
            promptInput.placeholder = UI_STRINGS[currentLanguage].voicePlaceholder;
            renderGuidedTraceLibrary();
        };

        templateCategorySelect.onchange = () => {
            renderGuidedTraceLibrary();
        };

        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeToggleBtn').innerText = isDark ? "☀️ Light" : "🌙 Mode";
        };

        setTimeout(setupCanvasLayout, 150);
    })();
</script>
</body>
</html>

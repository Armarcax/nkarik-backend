<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 Նկարիկ - Մեծիկ (5-7)</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        @keyframes rainbowBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes starPop { 0% { transform: scale(0) rotate(0deg); } 50% { transform: scale(1.3) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); } }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #6BCB77 0%, #4D96FF 25%, #9B59B6 50%, #FF6B6B 75%, #6BCB77 100%);
            background-size: 400% 400%;
            animation: rainbowBg 18s ease infinite;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            overflow-y: auto; 
        }

        .app-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px);
            border-radius: 32px; 
            padding: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            max-width: 480px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 16px; 
        }

        .header { text-align: center; padding: 8px; }
        .header h1 { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #6BCB77, #4D96FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { font-size: 13px; color: #888; font-weight: 600; }

        .lang-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .lang-btn {
            padding: 8px 16px;
            border: 2px solid #E5E5EA;
            border-radius: 16px;
            background: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #6BCB77, #4D96FF);
            color: white;
            border-color: transparent;
        }

        .category-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px;
        }
        .cat-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 14px;
            background: #E5E5EA;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .cat-btn.active {
            background: linear-gradient(135deg, #6BCB77, #4D96FF);
            color: white;
        }

        .template-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px;
            background: #F2F2F7;
            border-radius: 16px;
        }
        .template-item {
            flex: 0 0 70px;
            height: 70px;
            border: 3px solid #E5E5EA;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .template-item:active { transform: scale(0.95); }
        .template-item.active {
            border-color: #4D96FF;
            background: #E8F4FF;
            animation: bounce 0.4s ease;
        }
        .template-item svg {
            width: 60%;
            height: 60%;
            stroke: #4D96FF;
            stroke-width: 3;
            fill: none;
        }
        .template-item span {
            font-size: 10px;
            font-weight: 700;
            color: #555;
        }

        .canvas-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
            overflow: hidden;
            touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .guide-overlay {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%;
            opacity: 0.25; z-index: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .guide-overlay svg { width: 100%; height: 100%; stroke: #4D96FF; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        .tools-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .tool-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            background: #F2F2F7;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-btn.active { background: linear-gradient(135deg, #6BCB77, #4D96FF); color: white; }

        .color-palette {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 8px;
            background: #F2F2F7;
            border-radius: 16px;
        }
        .color-dot {
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .color-dot.active { transform: scale(1.15); border-color: #333; }

        .action-btns { display: flex; gap: 10px; }
        .big-btn {
            flex: 1; padding: 14px; border: none; border-radius: 18px;
            font-size: 16px; font-weight: 800; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .big-btn:active { transform: scale(0.97); }
        .btn-check { background: linear-gradient(135deg, #6BCB77, #4D96FF); }
        .btn-clear { background: linear-gradient(135deg, #A0A0A0, #C0C0C0); }

        .score-panel {
            display: none;
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, #FFF9E6, #E6F7FF);
            border-radius: 20px;
            animation: fadeIn 0.5s ease;
        }
        .score-stars { font-size: 40px; margin: 8px 0; }
        .score-text { font-size: 18px; font-weight: 800; color: #4D96FF; }
        .score-bar {
            width: 100%; height: 20px;
            background: #E5E5EA;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #6BCB77, #4D96FF);
            border-radius: 10px;
            transition: width 1s ease;
        }

        .result-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.5s ease;
        }
        .result-img {
            width: 100%; aspect-ratio: 1;
            border-radius: 24px; object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>🎨 Մեծիկ</h1>
        <div class="subtitle">Ուրվագծիր և սովորիր! (5-7 տ.)</div>
    </div>

    <div class="lang-tabs">
        <button class="lang-btn active" onclick="setLanguage('hy')">🇦🇲 Հայերեն</button>
        <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</button>
        <button class="lang-btn" onclick="setLanguage('ru')">🇷🇺 Русский</button>
    </div>

    <div class="category-tabs" id="categoryTabs">
        <button class="cat-btn active" onclick="setCategory('letters')">🔤 Տառեր</button>
        <button class="cat-btn" onclick="setCategory('numbers')">🔢 Թվեր</button>
        <button class="cat-btn" onclick="setCategory('objects')">🧸 Պատկերներ</button>
    </div>

    <div class="template-scroll" id="templateScroll"></div>

    <div class="canvas-area" id="canvasArea">
        <div class="guide-overlay" id="guideOverlay"></div>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="tools-row">
        <button class="tool-btn active" onclick="setTool('pencil')">✏️ Մատիտ</button>
        <button class="tool-btn" onclick="setTool('brush')">🖌️ Վրձին</button>
        <button class="tool-btn" onclick="setTool('eraser')">🧼 Ռետին</button>
    </div>

    <div class="color-palette" id="colorPalette"></div>

    <div class="action-btns">
        <button class="big-btn btn-check" onclick="checkAccuracy()">⭐ Ստուգել</button>
        <button class="big-btn btn-clear" onclick="clearCanvas()">🗑️ Մաքրել</button>
    </div>

    <div class="score-panel" id="scorePanel">
        <div class="score-stars" id="scoreStars"></div>
        <div class="score-text" id="scoreText"></div>
        <div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
    </div>

    <div class="result-panel" id="resultPanel">
        <img class="result-img" id="resultImg" alt="Result">
        <button class="big-btn btn-check" onclick="saveArt()">💾 Պահպանել</button>
    </div>
</div>

const JUNIOR_COLORS = [
    '#FF3B30', '#FF9500', '#FFCC00', '#34C759', 
    '#007AFF', '#5856D6', '#FF2D55', '#AF52DE',
    '#00C7BE', '#FF6B6B', '#4D96FF', '#6BCB77'
];

let currentLang = 'hy';
let currentCategory = 'letters';
let currentTemplate = null;
let currentTool = 'pencil';
let currentColor = '#4D96FF';
let isDrawing = false;
let userStrokes = [];

const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');
const guideOverlay = document.getElementById('guideOverlay');

function setupCanvas() {
    const rect = document.getElementById('canvasArea').getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}

function setLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderTemplates();
}

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderTemplates();
}

function renderTemplates() {
    const scroll = document.getElementById('templateScroll');
    scroll.innerHTML = '';

    const items = JUNIOR_DATA[currentLang][currentCategory];
    items.forEach(tmpl => {
        const item = document.createElement('div');
        item.className = 'template-item';
        item.innerHTML = `
            <svg viewBox="0 0 100 100"><path d="${tmpl.path}" /></svg>
            <span>${tmpl.label}</span>
        `;
        item.onclick = () => selectTemplate(tmpl, item);
        scroll.appendChild(item);
    });
}

function selectTemplate(tmpl, element) {
    currentTemplate = tmpl;
    userStrokes = [];
    document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');

    guideOverlay.innerHTML = `<svg viewBox="0 0 100 100"><path d="${tmpl.path}" /></svg>`;
    clearCanvas();
    document.getElementById('scorePanel').style.display = 'none';
}

function renderColors() {
    const palette = document.getElementById('colorPalette');
    palette.innerHTML = '';

    JUNIOR_COLORS.forEach((color, i) => {
        const dot = document.createElement('div');
        dot.className = `color-dot ${i === 4 ? 'active' : ''}`;
        dot.style.backgroundColor = color;
        dot.onclick = () => {
            currentColor = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        };
        palette.appendChild(dot);
    });
}

function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(e) {
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    userStrokes.push([pos]);
}

function draw(e) {
    if (!isDrawing) return;
    const pos = getPos(e);

    if (currentTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 20;
    } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentTool === 'brush' ? 12 : 6;
    }

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    if (userStrokes.length > 0) {
        userStrokes[userStrokes.length - 1].push(pos);
    }
}

function stopDraw() {
    isDrawing = false;
    ctx.beginPath();
    ctx.globalCompositeOperation = 'source-over';
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    userStrokes = [];
    document.getElementById('scorePanel').style.display = 'none';
    document.getElementById('resultPanel').style.display = 'none';
}

// Simple accuracy check based on pixel coverage
function checkAccuracy() {
    if (!currentTemplate || userStrokes.length === 0) {
        alert('Նախ նկարիր ուրվագիծը!');
        return;
    }

    // Create a canvas with the guide path
    const guideCanvas = document.createElement('canvas');
    guideCanvas.width = canvas.width;
    guideCanvas.height = canvas.height;
    const gctx = guideCanvas.getContext('2d');

    gctx.strokeStyle = 'white';
    gctx.lineWidth = 15;
    gctx.lineCap = 'round';
    gctx.lineJoin = 'round';

    const path = new Path2D(currentTemplate.path);
    gctx.save();
    gctx.translate(canvas.width/2, canvas.height/2);
    gctx.scale(canvas.width/100 * 0.9, canvas.height/100 * 0.9);
    gctx.translate(-50, -50);
    gctx.stroke(path);
    gctx.restore();

    // Get pixel data
    const guideData = gctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const userData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    let guidePixels = 0;
    let coveredPixels = 0;

    for (let i = 3; i < guideData.length; i += 4) {
        if (guideData[i] > 0) {
            guidePixels++;
            if (userData[i] > 0) {
                coveredPixels++;
            }
        }
    }

    const accuracy = guidePixels > 0 ? Math.round((coveredPixels / guidePixels) * 100) : 0;
    showScore(accuracy);
}

function showScore(accuracy) {
    const panel = document.getElementById('scorePanel');
    const stars = document.getElementById('scoreStars');
    const text = document.getElementById('scoreText');
    const fill = document.getElementById('scoreFill');

    panel.style.display = 'block';

    // Stars
    let starCount = accuracy > 80 ? 3 : accuracy > 50 ? 2 : 1;
    stars.innerText = '⭐'.repeat(starCount);

    // Text
    const messages = {
        hy: { high: 'Գերազանց! 🎉', mid: 'Լավ է! 👍', low: 'Փորձիր կրկին! 💪' },
        en: { high: 'Excellent! 🎉', mid: 'Good job! 👍', low: 'Try again! 💪' },
        ru: { high: 'Отлично! 🎉', mid: 'Хорошо! 👍', low: 'Попробуй еще! 💪' }
    };

    let level = accuracy > 80 ? 'high' : accuracy > 50 ? 'mid' : 'low';
    text.innerText = `${messages[currentLang][level]} — ${accuracy}%`;

    // Bar
    fill.style.width = accuracy + '%';

    // Generate colored result
    generateResult(accuracy);
}

function generateResult(accuracy) {
    const resultCanvas = document.createElement('canvas');
    resultCanvas.width = 512;
    resultCanvas.height = 512;
    const rctx = resultCanvas.getContext('2d');

    // Background based on accuracy
    const grad = rctx.createLinearGradient(0, 0, 512, 512);
    if (accuracy > 80) {
        grad.addColorStop(0, '#E8F5E9');
        grad.addColorStop(1, '#C8E6C9');
    } else if (accuracy > 50) {
        grad.addColorStop(0, '#FFF8E1');
        grad.addColorStop(1, '#FFECB3');
    } else {
        grad.addColorStop(0, '#FFEBEE');
        grad.addColorStop(1, '#FFCDD2');
    }
    rctx.fillStyle = grad;
    rctx.fillRect(0, 0, 512, 512);

    // Draw the shape with user's color
    rctx.strokeStyle = currentColor;
    rctx.fillStyle = currentColor + '40';
    rctx.lineWidth = 8;

    const path = new Path2D(currentTemplate.path);
    rctx.save();
    rctx.translate(256, 256);
    rctx.scale(3.5, 3.5);
    rctx.translate(-50, -50);
    rctx.fill(path);
    rctx.stroke(path);
    rctx.restore();

    // Add sparkles for high accuracy
    if (accuracy > 80) {
        for (let i = 0; i < 30; i++) {
            rctx.fillStyle = `hsl(${Math.random() * 360}, 100%, 70%)`;
            rctx.beginPath();
            rctx.arc(Math.random() * 512, Math.random() * 512, Math.random() * 6 + 2, 0, Math.PI * 2);
            rctx.fill();
        }
    }

    document.getElementById('resultImg').src = resultCanvas.toDataURL('image/png');
    document.getElementById('resultPanel').style.display = 'flex';
}

function saveArt() {
    const link = document.createElement('a');
    link.download = `nkarik-junior-${Date.now()}.png`;
    link.href = document.getElementById('resultImg').src;
    link.click();
}

// Events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseout', stopDraw);

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', stopDraw);

window.addEventListener('resize', setupCanvas);

// Init
setTimeout(() => {
    setupCanvas();
    renderTemplates();
    renderColors();
}, 100);
</script>

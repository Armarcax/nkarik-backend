<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 Նկարիկ - Մեծիկ (5-7)</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --accent: #007AFF;
            --success: #34C759;
            --warning: #FFCC00;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--glass); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 600px; width: 100%;
            margin-top: 60px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; color: #1a1a2e; }

        .toolbar { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .btn {
            padding: 8px 16px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05);
            background: white; font-weight: 600; cursor: pointer; white-space: nowrap;
            transition: all 0.2s;
        }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .levels { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .level-dot {
            flex: 1; text-align: center; font-size: 0.7rem; font-weight: 700;
            padding: 5px; cursor: pointer; border-bottom: 3px solid #eee;
        }
        .level-dot.active { border-color: var(--accent); color: var(--accent); }

        .canvas-area {
            position: relative; width: 100%; aspect-ratio: 1;
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
        #guideCanvas { opacity: 0.25; pointer-events: none; transition: opacity 0.5s; }

        .analysis-overlay {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 15px;
            font-size: 0.75rem; display: none; grid-template-columns: 1fr 1fr; gap: 5px;
            z-index: 10;
        }

        .templates { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .tmpl-card {
            min-width: 80px; height: 80px; background: white; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid transparent; flex-shrink: 0;
        }
        .tmpl-card.active { border-color: var(--accent); background: #f0f7ff; }
        .tmpl-card svg { width: 50px; height: 50px; }
        .tmpl-card span { font-size: 0.7rem; font-weight: 700; margin-top: 2px; }

        .score-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; items-center; justify-content: center;
            z-index: 1000; color: white; text-align: center; padding: 20px;
        }
        .stars { font-size: 4rem; margin: 20px 0; }
        .stats { font-size: 1rem; opacity: 0.9; margin-bottom: 20px; }

        .challenge-banner {
            background: linear-gradient(90deg, #6c5ce7, #a1c4fd);
            color: white; padding: 10px 20px; border-radius: 15px;
            font-weight: 800; font-size: 0.8rem; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">🏠</button>

    <div class="container">
        <div class="card header-card">
            <div class="header">
                <h1>🎨 Նկարիկ - Մեծիկ</h1>
                <select class="btn" id="langSelect" onchange="setLang(this.value)">
                    <option value="hy">🇦🇲 Հայերեն</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="ru">🇷🇺 Русский</option>
                </select>
            </div>
        </div>

        <div class="challenge-banner" id="challengeBanner">
            <span>🔥 Օրվա մարտահրավեր. Գրիր 'Ա' տառը</span>
            <button class="btn" style="padding:4px 10px; font-size:0.7rem" onclick="startChallenge()">ՍԿՍԵԼ</button>
        </div>

        <div class="card">
            <div class="levels">
                <div class="level-dot active" data-lvl="0">Սկսնակ</div>
                <div class="level-dot" data-lvl="1">Հեշտ</div>
                <div class="level-dot" data-lvl="2">Միջին</div>
                <div class="level-dot" data-lvl="3">Բարդ</div>
                <div class="level-dot" data-lvl="4">Հանճար</div>
            </div>

            <div class="toolbar" id="cats">
                <button class="btn active" data-cat="hy_letters">Տառեր</button>
                <button class="btn" data-cat="numbers">Թվեր</button>
                <button class="btn" data-cat="objects">Պատկերներ</button>
            </div>

            <div class="templates" id="tmplList"></div>

            <div class="canvas-area">
                <canvas id="guideCanvas"></canvas>
                <canvas id="userCanvas"></canvas>
                <div class="analysis-overlay" id="analysis">
                    <div>Ճշգրտություն: <span id="valAcc">0</span>%</div>
                    <div>Արագություն: <span id="valSpeed">0</span>մվ</div>
                    <div>Համաչափություն: <span id="valProp">0</span>%</div>
                    <div>Ոճ: <span id="valStyle">Normal</span></div>
                </div>
            </div>

            <div class="toolbar" style="margin-top:15px; justify-content:space-between">
                <div id="palette" style="display:flex; gap:5px"></div>
                <div style="display:flex; gap:5px">
                    <button class="btn" onclick="undo()">↩️</button>
                    <button class="btn" onclick="clearCanvas()">🗑️</button>
                    <button class="btn active" style="background:var(--success)" onclick="checkResult()">ՍՏՈՒԳԵԼ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="score-panel" id="scorePanel">
        <h2 id="scoreTitle">Գերազանց!</h2>
        <div class="stars" id="starContainer">⭐⭐⭐</div>
        <div class="stats" id="statSummary"></div>
        <div style="display:flex; gap:10px">
            <button class="btn" onclick="closeScore()">Փորձել նորից</button>
            <button class="btn active" onclick="saveImage()">Պահպանել</button>
        </div>
    </div>

    <script src="shared/templates.js"></script>
    <script>
        const uCanvas = document.getElementById('userCanvas');
        const gCanvas = document.getElementById('guideCanvas');
        const uCtx = uCanvas.getContext('2d', {willReadFrequently:true});
        const gCtx = gCanvas.getContext('2d');

        let currentLang = 'hy';
        let currentCat = 'hy_letters';
        let currentLvl = 0;
        let selectedTmpl = null;
        let isDrawing = false;
        let points = [];
        let history = [];
        let color = '#007AFF';

        let startTime = 0;
        let totalTime = 0;

        const LVLS = [
            {tol: 30, guide: 0.3, name: 'Beginner'},
            {tol: 20, guide: 0.2, name: 'Easy'},
            {tol: 15, guide: 0.1, name: 'Medium'},
            {tol: 10, guide: 0.05, name: 'Advanced'},
            {tol: 5, guide: 0, name: 'Genius'}
        ];

        function init() {
            resize();
            renderPalette();
            renderTmpls();
            setLang('hy');

            document.querySelectorAll('.level-dot').forEach(d => {
                d.onclick = () => {
                    document.querySelectorAll('.level-dot').forEach(el => el.classList.remove('active'));
                    d.classList.add('active');
                    currentLvl = parseInt(d.dataset.lvl);
                    renderGuide();
                };
            });

            document.querySelectorAll('#cats .btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('#cats .btn').forEach(el => el.classList.remove('active'));
                    b.classList.add('active');
                    currentCat = b.dataset.cat;
                    renderTmpls();
                };
            });
        }

        function resize() {
            const size = uCanvas.parentElement.clientWidth;
            uCanvas.width = gCanvas.width = size;
            uCanvas.height = gCanvas.height = size;
            uCtx.lineCap = uCtx.lineJoin = 'round';
            renderGuide();
            redraw();
        }

        function renderPalette() {
            const pal = document.getElementById('palette');
            ['#007AFF', '#34C759', '#FF3B30', '#FFCC00', '#000000'].forEach(c => {
                const d = document.createElement('div');
                d.style.width='30px'; d.style.height='30px'; d.style.borderRadius='50%';
                d.style.background = c; d.style.cursor='pointer'; d.style.border='2px solid white';
                if(c===color) d.style.boxShadow='0 0 0 2px var(--accent)';
                d.onclick = () => {
                    color = c;
                    document.querySelectorAll('#palette div').forEach(el=>el.style.boxShadow='none');
                    d.style.boxShadow='0 0 0 2px var(--accent)';
                };
                pal.appendChild(d);
            });
        }

        function renderTmpls() {
            const list = document.getElementById('tmplList');
            list.innerHTML = '';
            const items = GUIDED_TEMPLATES.filter(t => t.cat === currentCat || (currentCat === 'objects' && t.cat === 'objects'));
            items.forEach(t => {
                const card = document.createElement('div');
                card.className = `tmpl-card ${selectedTmpl?.id===t.id?'active':''}`;
                card.innerHTML = `${t.svg}<span>${t.label[currentLang]}</span>`;
                card.onclick = () => {
                    selectedTmpl = t;
                    document.querySelectorAll('.tmpl-card').forEach(el=>el.classList.remove('active'));
                    card.classList.add('active');
                    renderGuide();
                    clearCanvas();
                    speak(t.label[currentLang]);
                };
                list.appendChild(card);
            });
            if(!selectedTmpl && items.length > 0) {
                selectedTmpl = items[0];
                renderGuide();
            }
        }

        function renderGuide() {
            gCtx.clearRect(0,0,gCanvas.width,gCanvas.height);
            if(!selectedTmpl) return;
            const pStr = selectedTmpl.path || getPathTemplate(selectedTmpl.id);
            if(!pStr) return;
            const p2d = new Path2D(pStr);
            const margin = gCanvas.width * 0.05;
            const scale = gCanvas.width * 0.9 / 100;
            gCtx.save();
            gCtx.translate(margin, margin);
            gCtx.scale(scale, scale);
            gCtx.strokeStyle = '#007AFF';
            gCtx.lineWidth = 1;
            gCtx.stroke(p2d);
            gCtx.restore();

            gCanvas.style.opacity = LVLS[currentLvl].guide;
            if(currentLvl === 4) { // Genius: show and fade
                gCanvas.style.opacity = 0.5;
                setTimeout(() => gCanvas.style.opacity = 0, 1000);
            }
        }

        uCanvas.onmousedown = uCanvas.ontouchstart = (e) => {
            if(e.type==='touchstart') e.preventDefault();
            isDrawing = true;
            points = [getPos(e)];
            if(startTime === 0) startTime = performance.now();
        };

        window.onmousemove = window.ontouchmove = (e) => {
            if(!isDrawing) return;
            const p = getPos(e);
            uCtx.beginPath();
            uCtx.strokeStyle = color;
            uCtx.lineWidth = 10;
            uCtx.moveTo(points[points.length-1].x, points[points.length-1].y);
            uCtx.lineTo(p.x, p.y);
            uCtx.stroke();
            points.push(p);
        };

        window.onmouseup = window.ontouchend = () => {
            if(!isDrawing) return;
            isDrawing = false;
            if(points.length > 1) {
                history.push({pts: [...points], c: color});
                totalTime += (performance.now() - startTime);
                startTime = 0;
            }
        };

        function getPos(e) {
            const rect = uCanvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function clearCanvas() { history = []; redraw(); totalTime = 0; }
        function undo() { history.pop(); redraw(); }

        function redraw() {
            uCtx.clearRect(0,0,uCanvas.width,uCanvas.height);
            history.forEach(h => {
                uCtx.beginPath();
                uCtx.strokeStyle = h.c;
                uCtx.lineWidth = 10;
                uCtx.moveTo(h.pts[0].x, h.pts[0].y);
                h.pts.forEach(p => uCtx.lineTo(p.x, p.y));
                uCtx.stroke();
            });
        }

        function checkResult() {
            if(!selectedTmpl) return;
            const acc = calculateAccuracy();
            const speed = Math.round(totalTime);
            const prop = calculateProportions();
            const style = speed < 1000 ? "Fast" : (speed > 5000 ? "Careful" : "Normal");

            document.getElementById('valAcc').innerText = acc;
            document.getElementById('valSpeed').innerText = speed;
            document.getElementById('valProp').innerText = prop;
            document.getElementById('valStyle').innerText = style;
            document.getElementById('analysis').style.display = 'grid';

            showScore(acc, speed, prop);
        }

        function calculateAccuracy() {
            const tCanvas = document.createElement('canvas');
            tCanvas.width = uCanvas.width; tCanvas.height = uCanvas.height;
            const tCtx = tCanvas.getContext('2d');
            const margin = uCanvas.width * 0.05;
            const scale = uCanvas.width * 0.9 / 100;
            tCtx.translate(margin, margin); tCtx.scale(scale, scale);
            const pStr = selectedTmpl.path || getPathTemplate(selectedTmpl.id);
            const p2d = new Path2D(pStr);
            tCtx.lineWidth = LVLS[currentLvl].tol / scale;
            tCtx.strokeStyle = '#000';
            tCtx.stroke(p2d);

            const gData = tCtx.getImageData(0,0,uCanvas.width, uCanvas.height).data;
            const uData = uCtx.getImageData(0,0,uCanvas.width, uCanvas.height).data;
            let gPix = 0, covered = 0;
            for(let i=3; i<gData.length; i+=4) {
                if(gData[i]>10) { gPix++; if(uData[i]>10) covered++; }
            }
            return gPix > 0 ? Math.round((covered/gPix)*100) : 0;
        }

        function calculateProportions() {
            // Find bounds of user drawing
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            history.forEach(h => h.pts.forEach(p => {
                minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
            }));
            if(minX === Infinity) return 0;
            const uW = maxX - minX; const uH = maxY - minY;
            const aspect = uW / (uH || 1);

            // Standard aspect for templates is 1 (100x100)
            const diff = Math.abs(1 - aspect);
            return Math.max(0, Math.round(100 - (diff * 50)));
        }

        function showScore(acc, speed, prop) {
            const panel = document.getElementById('scorePanel');
            const stars = document.getElementById('starContainer');
            const title = document.getElementById('scoreTitle');
            const summary = document.getElementById('statSummary');

            let starCount = 1;
            if(acc > 80 && prop > 70) starCount = 3;
            else if(acc > 50) starCount = 2;

            stars.innerText = '⭐'.repeat(starCount);
            title.innerText = starCount === 3 ? "Հիանալի է!" : (starCount === 2 ? "Լավ է!" : "Էլի փորձիր");
            summary.innerText = `Ճշգրտություն: ${acc}% | Ժամանակ: ${speed}մվ`;

            panel.style.display = 'flex';
            speak(title.innerText);
        }

        function closeScore() { document.getElementById('scorePanel').style.display = 'none'; clearCanvas(); }

        function saveImage() {
            const c = document.createElement('canvas');
            c.width = uCanvas.width; c.height = uCanvas.height;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0,0,c.width,c.height);
            ctx.drawImage(uCanvas, 0, 0);
            const link = document.createElement('a');
            link.download = 'nkarik_trace.png';
            link.href = c.toDataURL();
            link.click();
        }

        function setLang(l) {
            currentLang = l;
            const UI = {
                hy: {trace:'Տառեր', nums:'Թվեր', obj:'Պատկերներ', check:'ՍՏՈՒԳԵԼ'},
                en: {trace:'Letters', nums:'Numbers', obj:'Objects', check:'CHECK'},
                ru: {trace:'Буквы', nums:'Цифры', obj:'Предметы', check:'ПРОВЕРИТЬ'}
            };
            const labels = UI[l];
            document.querySelectorAll('#cats .btn')[0].innerText = labels.trace;
            document.querySelectorAll('#cats .btn')[1].innerText = labels.nums;
            document.querySelectorAll('#cats .btn')[2].innerText = labels.obj;
            renderTmpls();
        }

        function speak(text) {
            if(!window.speechSynthesis) return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = currentLang === 'hy' ? 'hy-AM' : (currentLang === 'ru' ? 'ru-RU' : 'en-US');
            window.speechSynthesis.speak(u);
        }

        function startChallenge() {
            currentCat = 'hy_letters';
            selectedTmpl = GUIDED_TEMPLATES.find(t => t.id === 'hy_A');
            renderTmpls();
            renderGuide();
            clearCanvas();
        }

        window.onresize = resize;
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

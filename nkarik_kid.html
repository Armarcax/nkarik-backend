<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 Նկարիկ AI — Ultimate Education Studio</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }
        
        @keyframes rainbowBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 20%, #a1c4fd 40%, #c2e9fb 60%, #e0c3fc 80%, #ff9a9e 100%);
            background-size: 400% 400%;
            animation: rainbowBackground 20s ease infinite;
            color: #1D1D1F; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            overflow-y: auto;
        }

        .app-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px; 
            padding: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
            max-width: 480px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            margin-bottom: 20px; 
            transition: all 0.3s ease; 
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-select {
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            background: white;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        /* Կատեգորիաների և Ոճերի Տողեր */
        .styleTabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Կարող եք դարձնել 4, 5 կամ ավելի */
            gap: 10px;
            max-height: 300px; /* Կամ հանեք սա */
            overflow-y: auto;   /* Սա թույլ կտա ոլորել (scroll), եթե շատ են */
        }
        .tmpl-tabs, .style-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .tmpl-tabs::-webkit-scrollbar, .style-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 8px 14px;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .tab-btn.active {
            background: #6c5ce7;
            color: white;
            transform: scale(1.04);
        }

        .style-btn {
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .style-btn.active {
            background: #00b894;
            color: white;
            border-color: #00b894;
            box-shadow: 0 4px 10px rgba(0, 184, 148, 0.25);
            transform: scale(1.03);
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #636e72;
            margin-bottom: -4px;
            padding-left: 2px;
        }

        .tmpl-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 230px;
            overflow-y: auto;
            padding: 4px;
            border-radius: 18px;
            background: rgba(0,0,0,0.02);
        }

        .tmpl-item {
            background: white;
            border-radius: 16px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .tmpl-item:active, .tmpl-item.selected {
            border-color: #6c5ce7;
            background: #f4f1fe;
            transform: scale(0.96);
        }
        .tmpl-item svg {
            width: 55px;
            height: 55px;
            background: #fafafa;
            border-radius: 10px;
        }
        .tmpl-item span {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            color: #444;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.03);
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.8);
            touch-action: none;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            cursor: crosshair;
            z-index: 2;
        }

        .bg-svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.25;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .tool-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.03);
            padding: 8px;
            border-radius: 20px;
        }

        .color-palette {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .color-palette::-webkit-scrollbar { display: none; }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .color-dot.active {
            transform: scale(1.2);
            box-shadow: 0 0 0 2px #6c5ce7;
        }

        .action-btns {
            display: flex;
            gap: 6px;
        }

        .btn-round {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .btn-round:active { transform: scale(0.9); }

        .main-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(108,92,231,0.3);
            transition: all 0.2s;
        }
        .btn-primary:disabled { background: #b2bec3; box-shadow: none; }
        .btn-secondary { background: #00b894; box-shadow: 0 8px 20px rgba(0,184,148,0.3); }

        .result-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .result-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 28px;
            overflow: hidden;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .result-img, video { width: 100%; height: 100%; object-fit: cover; }
        
        .loading-box {
            display: none;
            text-align: center;
            font-weight: 700;
            color: #6c5ce7;
            padding: 10px;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <header>
        <div class="brand">
            <h1>🎨 Նկարիկ AI</h1>
        </div>
        <select class="lang-select" id="langSelect">
            <option value="hy">Հայերեն</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
        </select>
    </header>

    <div class="tmpl-tabs">
        <button class="tab-btn active" data-cat="animals">🐱 <span data-key="cat_animals">Կենդանիներ</span></button>
        <button class="tab-btn" data-cat="food">🍏 <span data-key="cat_food">Ուտելիք</span></button>
        <button class="tab-btn" data-cat="vehicles">🚗 <span data-key="cat_vehicles">Մեքենաներ</span></button>
        <button class="tab-btn" data-cat="nature">🌞 <span data-key="cat_nature">Բնություն</span></button>
        <button class="tab-btn" data-cat="toys">🧸 <span data-key="cat_toys">Խաղալիքներ</span></button>
    </div>

    <div class="section-label" id="styleLabel">✨ Ընտրիր նկարի ոճը.</div>
    <div class="style-tabs" id="styleTabs"></div>

    <div class="tmpl-grid" id="tmplGrid"></div>

    <div class="canvas-container">
        <svg class="bg-svg-layer" id="bgSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg"></svg>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="tool-bar">
        <div class="color-palette" id="palette"></div>
        <div class="action-btns">
            <button class="btn-round" id="undoBtn">↩️</button>
            <button class="btn-round" id="clearBtn">🗑️</button>
        </div>
    </div>

    <div class="loading-box" id="loadingText">✨ Magic is happening...</div>

    <div class="main-actions">
        <button class="btn-primary" id="generateBtn">🔮 AI Պատկեր</button>
        <button class="btn-primary btn-secondary" id="videoBtn">🎬 AI Վիդեո</button>
    </div>
</div>

<div class="app-card result-panel" id="resultPanel">
    <h2 style="font-size: 18px; font-weight:700;" id="resultTitle">Քո հրաշքը պատրաստ է</h2>
    <div class="result-wrapper">
        <img class="result-img" id="resultImg" alt="AI Result" style="display:none;">
        <video id="videoFake" autoplay loop muted playsinline style="display:none;"></video>
    </div>
    <div class="main-actions">
        <button class="btn-primary" id="downloadBtn">💾 Պահպանել</button>
        <button class="btn-primary btn-secondary" id="newBtn">✨ Նոր Նկար</button>
    </div>
</div>

<script>
    (function() {
        const UI_STRINGS = {
            hy: {
                cat_animals: "Կենդանիներ", cat_food: "Ուտելիք", cat_vehicles: "Մեքենաներ",
                cat_nature: "Բնություն", cat_toys: "Խաղալիքներ", loading: "✨ Կախարդանքը ընթացքի մեջ է...",
                resultTitle: "Քո հրաշքը պատրաստ է", alertSelect: "Խնդրում ենք ընտրել որևէ կաղապար նախքան սկսելը",
                alertFail: "Օյ, կապի խնդիր եղավ, կրկին փորձիր", style_label: "✨ Ընտրիր նկարի ոճը."
            },
            en: {
                cat_animals: "Animals", cat_food: "Food", cat_vehicles: "Vehicles",
                cat_nature: "Nature", cat_toys: "Toys", loading: "✨ Magic is happening...",
                resultTitle: "Your Masterpiece is Ready", alertSelect: "Please select a template first!",
                alertFail: "Oops! Generation timed out. Try again!", style_label: "✨ Choose drawing style:"
            },
            ru: {
                cat_animals: "Животные", cat_food: "Еда", cat_vehicles: "Машины",
                cat_nature: "Природа", cat_toys: "Игрушки", loading: "✨ Магия происходит...",
                resultTitle: "Твой шедевр готов", alertSelect: "Пожалуйста, выберите шаблон сначала!",
                alertFail: "Ой, ошибка генерации. Попробуйте еще раз!", style_label: "✨ Выбери стиль рисунка:"
            }
        };

        // Ոճերի տվյալների բազա (STYLE_CATEGORIES)
        const STYLE_CATEGORIES = {
           kids: [
                { id: 'pixar', badge: '🚀', hy: 'Պիքսար 3D', en: 'Pixar Inspired', ru: 'Пиксар 3D', prompt: 'cute Pixar 3D style character, smooth rendered lighting, claymation vibrant product design' },
                { id: 'disney', badge: '👑', hy: 'Դիսնեյ', en: 'Disney Inspired', ru: 'Дисней', prompt: 'classic modern Disney animation style, rich magical background, expressive eyes' },
                { id: 'kawaii', badge: '🌸', hy: 'Կավայի', en: 'Cute Kawaii', ru: 'Кавайи', prompt: 'adorable Japanese kawaii aesthetics, pastel colors, tiny smile, soft minimalist art' },
                { id: 'bird_letter', badge: '🦅', hy: 'Թռչնատառ', en: 'Bird-Letter', ru: 'Птичий шрифт', prompt: 'traditional ornate Armenian Bird-Letter (Թռչնատառ) manuscript style, ancient miniature illumination, decorative gold accents' },
                { id: 'plush', badge: '🧸', hy: 'Պլյուշ', en: 'Plush Toy', ru: 'Плюшевый', prompt: 'soft textured plush toy style, felt fabric details, cute stuffed animal texture' },
                { id: 'crayon', badge: '🖍️', hy: 'Կավիճ', en: 'Crayon Sketch', ru: 'Мелки', prompt: 'vibrant child drawing sketch, wax crayon texture, playful arts and crafts background' },
                { id: 'candy', badge: '🍬', hy: 'Քաղցրավենիք', en: 'Candy Style', ru: 'Конфетный', prompt: 'sweet glossy candy wonderland style, vibrant sugar coat colors' },
                { id: 'bubble', badge: '🧼', hy: 'Փուչիկներ', en: 'Bubble Cartoon', ru: 'Пузыри', prompt: 'bubbly round 3D vector cartoon illustration, glossy simple clay' },
                { id: 'bigeyes', badge: '👀', hy: 'Խոշոր աչքեր', en: 'Big Eyes Cartoon', ru: 'Большие глаза', prompt: 'big expressive shiny eyes baby cartoon design' },
                { id: 'coloring', badge: '📖', hy: 'Գունազարդում', en: 'Toddler Coloring', ru: 'Раскраска', prompt: 'clean solid colors with thick black outlines, toddler learning book style' },
                { id: 'nursery', badge: '🏡', hy: 'Մանկասենյակ', en: 'Nursery Style', ru: 'Детская комната', prompt: 'sweet whimsical nursery wallpaper art, soft warm pencil textures' },
                { id: 'rainbow', badge: '🌈', hy: 'Ծիածան', en: 'Rainbow Style', ru: 'Радужный', prompt: 'magical vibrant rainbow color scheme overlay' },
                { id: 'funnyfood', badge: '🍔', hy: 'Ուրախ ուտելիք', en: 'Funny Food Style', ru: 'Веселая еда', prompt: 'adorable living food item with tiny hands and joyful expressions' },
                { id: 'babycartoon', badge: '👶', hy: 'Մանկական', en: 'Baby Cartoon', ru: 'Малыш Муլտ', prompt: 'very simple clean character design for infants' },
                { id: 'pastelkids', badge: '🎨', hy: 'Մեղմ գուաշ', en: 'Soft Pastel Kids', ru: 'Нежная пастель', prompt: 'delicate light pastel palette drawing, gentle gouache' },
                { id: 'cookie', badge: '🍪', hy: 'Թխվածքաբլիթ', en: 'Cookie Cartoon', ru: 'Печенье', prompt: 'baked warm golden cookie textured overlay, cute frosting outlines' },
                { id: 'cuteanimal', badge: '🦊', hy: 'Սիրուն կենդանիներ', en: 'Cute Animal Style', ru: 'Милые животные', prompt: 'charming fluffy baby animal art style, fantasy fairytale coloring' },
                { id: 'smilingveggies', badge: '🥦', hy: 'Ժպտացող բանջարեղեն', en: 'Smiling Veggies', ru: 'Улыбающиеся овощи', prompt: 'healthy happy smiling animated vegetable character art' },
                { id: 'toybox', badge: '📦', hy: 'Խաղաղատուփ', en: 'Toy Box Style', ru: 'Коробка игрушек', prompt: 'miniature toy collection look, plastic and wooden toy model shading' },
                { id: 'kindergarten', badge: '🎒', hy: 'Մանկապարտեզ', en: 'Kindergarten Art', ru: 'Детский сад', prompt: 'innocent wax crayon and finger paint chaos style, raw child art' },
                { id: 'puffy', badge: '☁️', hy: 'Փքված 3D', en: 'Puffy Cartoon', ru: 'Пухлый 3D', prompt: 'inflated puffy 3D sticker style, smooth claymation soft shadow' },
                { id: 'chibi', badge: '🎎', hy: 'Չիբի անիմե', en: 'Chibi Kids', ru: 'Чиби', prompt: 'cute proportional chibi anime layout, large head, adorable features' }
            ]
        };

        function S(p) { return `<path d="${p}" fill="none" stroke="#2d3436" stroke-width="4" stroke-linecap="round"/>`; }
        function C(x,y,r) { return `<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="#2d3436" stroke-width="4"/>`; }
        function R(x,y,w,h,rx) { return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="none" stroke="#2d3436" stroke-width="4"/>`; }
        function L(x1,y1,x2,y2) { return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#2d3436" stroke-width="4" stroke-linecap="round"/>`; }

        // Database Injection
        const templates = [
            // 🍎 FOOD & FRUITS (15)
            {id:'apple', en:'Apple', hy:'Խնձոր', ru:'Яблоко', cat:'food', prompt:'cute cartoon apple for toddlers', svg: S('M250 140 Q270 120 290 140') + C(250,260,90) },
            {id:'banana', en:'Banana', hy:'Բանան', ru:'Банан', cat:'food', prompt:'happy yellow banana illustration', svg: S('M180 180 Q250 120 320 180 Q280 280 250 320 Q220 280 180 180') },
            {id:'orange', en:'Orange', hy:'Նարինջ', ru:'Апельсин', cat:'food', prompt:'simple orange fruit drawing', svg: C(250,250,80) + S('M250 170 L250 140 M240 180 L260 180') },
            {id:'strawberry', en:'Strawberry', hy:'Ելակ', ru:'Клубника', cat:'food', prompt:'cute strawberry with leaves', svg: S('M200 180 L250 320 L300 180 Q250 150 200 180') + S('M250 150 Q230 120 270 120 Q290 150 250 150') + C(230,220,5)+C(270,220,5)+C(250,260,5) },
            {id:'watermelon', en:'Watermelon', hy:'Ձմերուկ', ru:'Арбуз', cat:'food', prompt:'slice of watermelon cartoon', svg: S('M150 250 Q250 150 350 250 L150 250') + S('M150 250 L350 250') + S('M250 250 L250 210') + C(220,220,3)+C(280,220,3) },
            {id:'grapes', en:'Grapes', hy:'Խաղող', ru:'Виноград', cat:'food', prompt:'bunch of grapes simple', svg: S('M250 140 L250 180') + C(230,190,20)+C(270,190,20)+C(220,220,20)+C(260,220,20)+C(240,250,20)+C(230,240,10)+C(260,260,10) },
            {id:'pear', en:'Pear', hy:'Տանձ', ru:'Груша', cat:'food', prompt:'cute pear drawing', svg: S('M250 140 L250 160') + S('M250 160 Q220 200 210 260 Q250 320 290 260 Q280 200 250 160') },
            {id:'peach', en:'Peach', hy:'Դեղձ', ru:'Персик', cat:'food', prompt:'soft peach fruit illustration', svg: S('M250 140 L250 160') + C(220,200,50)+C(280,200,50)+C(250,280,60) + S('M250 160 Q250 200 250 250') },
            {id:'pineapple', en:'Pineapple', hy:'Անանաս', ru:'Ананас', cat:'food', prompt:'happy pineapple cartoon', svg: S('M250 320 L250 180') + R(210,180,80,120,20) + S('M250 180 Q230 140 210 120 M250 180 L250 110 M250 180 Q270 140 290 120') },
            {id:'cherry', en:'Cherry', hy:'Բալ', ru:'Вишня', cat:'food', prompt:'two cherries on a stem', svg: L(250,180,220,250)+L(250,180,280,250) + C(220,260,15)+C(280,260,15)+S('M250 180 Q240 150 260 140') },
            {id:'carrot', en:'Carrot', hy:'Գազար', ru:'Морковь', cat:'food', prompt:'orange carrot with leaves', svg: S('M250 140 L230 300 L270 300 L250 140') + S('M250 140 Q230 100 210 120 M250 140 L250 100 M250 140 Q270 100 290 120') },
            {id:'tomato', en:'Tomato', hy:'Լոլիկ', ru:'Помидор', cat:'food', prompt:'cute red tomato', svg: C(250,260,80) + S('M250 180 Q230 150 270 150 Q290 180 250 180') },
            {id:'cookie', en:'Cookie', hy:'Թխվածք', ru:'Печенье', cat:'food', prompt:'chocolate chip cookie simple', svg: C(250,250,90) + C(220,220,10)+C(280,240,10)+C(240,270,10)+C(270,280,8) },
            {id:'pizza', en:'Pizza', hy:'Պիցցա', ru:'Пицца', cat:'food', prompt:'slice of pizza cartoon', svg: S('M150 180 L350 180 L250 320 L150 180') + C(220,220,8)+C(280,240,8)+C(250,260,8) },

        function initCanvas() {
            const size = canvas.parentElement.clientWidth;
            canvas.width = size;
            canvas.height = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 8;
            redrawCanvas();
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) / rect.width,
                y: (clientY - rect.top) / rect.height
            };
        }

        function startDraw(e) {
            isDrawing = true;
            currentPath = [];
            const coords = getCoords(e);
            currentPath.push({ x: coords.x, y: coords.y, color: currentColor });

            currentPath.push({ x: coords.x, y: coords.y, color: currentColor });
            
            ctx.beginPath();
            const p1 = currentPath[currentPath.length - 2];
            const p2 = currentPath[currentPath.length - 1];
            ctx.strokeStyle = currentColor;
            ctx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
            ctx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
            ctx.stroke();
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPath.length > 0) {
                pathsHistory.push(currentPath);
            }
        }

        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pathsHistory.forEach(path => {
                if (path.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = path[0].color;
                ctx.moveTo(path[0].x * canvas.width, path[0].y * canvas.height);
                for (let i = 1; i < path.length; i++) {
                    ctx.lineTo(path[i].x * canvas.width, path[i].y * canvas.height);
                }
                ctx.stroke();
            });
        }

        function buildPalette() {
            palette.innerHTML = '';
            colors.forEach((color, i) => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${i === 0 ? 'active' : ''}`;
                dot.style.backgroundColor = color;
                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    currentColor = color;
                };
                palette.appendChild(dot);
            });
        }

        function renderTemplates() {
            tmplGrid.innerHTML = '';
            const filtered = templates.filter(t => t.cat === activeCategory);
            filtered.forEach(tmpl => {
                const item = document.createElement('div');
                item.className = `tmpl-item ${selectedTemplate?.id === tmpl.id ? 'selected' : ''}`;
                item.innerHTML = `
                    <svg viewBox="0 0 500 500">${tmpl.svg}</svg>
                    <span>${tmpl[currentLanguage]}</span>
                `;
                item.onclick = () => {
                    document.querySelectorAll('.tmpl-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    selectedTemplate = tmpl;
                    bgSvg.innerHTML = tmpl.svg;
                };
                tmplGrid.appendChild(item);
            });
        }

        // Ոճերի տողի ավտոմատ գեներացում (Style UI Render)
        function renderStyles() {
            const styleTabs = document.getElementById('styleTabs');
            if (!styleTabs) return;
            
            styleTabs.innerHTML = ''; // Մաքրում ենք հինը
            styleTabs.style.display = 'grid';
            styleTabs.style.gridTemplateColumns = 'repeat(auto-fill, minmax(100px, 1fr))';
            styleTabs.style.gap = '10px';

            // Օգտագործում ենք STYLE_CATEGORIES.kids-ի բոլոր տարրերը
            STYLE_CATEGORIES.kids.forEach(style => {
                const btn = document.createElement('button');
                btn.className = 'style-btn';
                btn.style.padding = '10px';
                btn.style.cursor = 'pointer';
                
                // Ցուցադրում ենք բեյջը և հայերեն անվանումը
                btn.innerHTML = `<div>${style.badge}</div><div style="font-size: 12px;">${style.hy}</div>`;
                
                btn.onclick = () => {
                    // Ակտիվ ոճի նշում
                    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedStyle = style.prompt; // Սա կօգտագործվի AI պրոմտի մեջ
                    console.log("Ընտրված ոճը՝", style.hy);
                };
                
                styleTabs.appendChild(btn);
            });
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (UI_STRINGS[lang][key]) el.textContent = UI_STRINGS[lang][key];
            });
            document.getElementById('resultTitle').textContent = UI_STRINGS[lang].resultTitle;
            styleLabel.textContent = UI_STRINGS[lang].style_label;
            renderTemplates();
            renderStyles();
        }

        async function processAI(isVideoMode) {
            if (!selectedTemplate) {
                alert(UI_STRINGS[currentLanguage].alertSelect);
                return;
            }

            loadingText.style.display = 'block';
            loadingText.textContent = UI_STRINGS[currentLanguage].loading;
            generateBtn.disabled = true;
            videoBtn.disabled = true;

            // Prompt Enhancement Logic: basePrompt + ", " + activeStyle.prompt
            const basePrompt = selectedTemplate.prompt || 'cute child drawing';
            const enhancedPrompt = `child safety high quality, ${basePrompt}, ${activeStyle.prompt}`;
            
            const seed = Math.floor(Math.random() * 999999);
            const url = isVideoMode 
                ? `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt + ' motion dynamic animation loop')}-video?width=512&height=512&seed=${seed}`
                : `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=512&height=512&seed=${seed}`;

            tryFetchImage(url, isVideoMode, 1);
        }

        function tryFetchImage(url, isVideoMode, attempt) {
            const img = new Image();
            img.src = url;
            img.onload = () => {
                loadingText.style.display = 'none';
                generateBtn.disabled = false;
                videoBtn.disabled = false;
                resultPanel.style.display = 'flex';

                if (isVideoMode) {
                    resultImg.style.display = 'none';
                    videoFake.style.display = 'block';
                    videoFake.src = url;
                } else {
                    videoFake.style.display = 'none';
                    resultImg.style.display = 'block';
                    resultImg.src = url;
                }
                resultPanel.scrollIntoView({ behavior: 'smooth' });
            };
            img.onerror = () => {
                if (attempt < 4) {
                    setTimeout(() => tryFetchImage(url, isVideoMode, attempt + 1), 1500);
                } else {
                    loadingText.style.display = 'none';
                    generateBtn.disabled = false;
                    videoBtn.disabled = false;
                    alert(UI_STRINGS[currentLanguage].alertFail);
                }
            };
        }

        document.getElementById('clearBtn').onclick = () => {
            pathsHistory = [];
            redrawCanvas();
        };

        document.getElementById('undoBtn').onclick = () => {
            pathsHistory.pop();
            redrawCanvas();
        };

        generateBtn.onclick = () => processAI(false);
        videoBtn.onclick = () => processAI(true);

        document.getElementById('downloadBtn').onclick = async () => {
            const currentSrc = resultImg.style.display !== 'none' ? resultImg.src : videoFake.src;
            try {
                const res = await fetch(currentSrc);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = `nkarik-ai-${Date.now()}.${resultImg.style.display !== 'none' ? 'png' : 'mp4'}`;
                a.click();
            } catch (e) {
                window.open(currentSrc, '_blank');
            }
        };

        document.getElementById('newBtn').onclick = () => {
            resultPanel.style.display = 'none';
            pathsHistory = [];
            selectedTemplate = null;
            bgSvg.innerHTML = '';
            redrawCanvas();
            renderTemplates();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.getAttribute('data-cat');
                renderTemplates();
            };
        });

        langSelect.onchange = (e) => setLanguage(e.target.value);

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, { passive: false });
        canvas.addEventListener('touchend', endDraw);

        window.onload = () => {
            buildPalette();
            initCanvas();
            renderTemplates();
            renderStyles();
            setLanguage('hy');
        };
        window.onresize = initCanvas;
    })();
</script>
</body>
</html>

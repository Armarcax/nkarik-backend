<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Nkarik PRO AI Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #0a0a12;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #6c5ce7;
            --neon: #00f3ff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: white;
            min-height: 100vh; overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; gap: 20px;
            z-index: 10;
        }

        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; background: linear-gradient(90deg, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .control-panel { display: flex; flex-direction: column; gap: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #666; font-weight: 800; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn {
            background: var(--glass); border: 1px solid var(--border);
            color: #ccc; padding: 10px; border-radius: 8px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: 0.2s;
        }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(108,92,231,0.3); }

        .slider { width: 100%; accent-color: var(--accent); margin-top: 5px; }

        input[type="text"] {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; color: white; font-size: 0.85rem; outline: none;
        }

        /* --- MAIN VIEW --- */
        .viewport { flex: 1; position: relative; display: flex; flex-direction: column; }

        .canvas-container { flex: 1; background: #000; position: relative; }
        canvas { width: 100% !important; height: 100% !important; }

        #drawingLayer { position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0.5; mix-blend-mode: screen; }
        #drawingLayer.active { pointer-events: auto; opacity: 1; }

        /* --- TIMELINE --- */
        .timeline {
            height: 120px; background: rgba(0,0,0,0.6); border-top: 1px solid var(--border);
            padding: 10px 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .frames { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: thin; }
        .frame-thumb {
            width: 60px; height: 60px; background: #111; border-radius: 6px;
            flex-shrink: 0; border: 2px solid transparent; cursor: pointer;
            display: flex; items-center; justify-center; font-size: 0.6rem; color: #444;
        }
        .frame-thumb.active { border-color: var(--accent); }

        /* --- OVERLAYS --- */
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 100; }

        #loading {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; items-center; justify-center; z-index: 1000;
        }

        .export-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 1px solid var(--accent); padding: 30px; border-radius: 20px;
            display: none; flex-direction: column; gap: 15px; z-index: 200;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">NKARIK PRO</div>

        <div class="control-panel">
            <div class="label">Work Mode</div>
            <div class="btn-group">
                <button class="btn active" id="mode3D" onclick="setAppMode('3d')">3D VIEW</button>
                <button class="btn" id="modeAnim" onclick="setAppMode('anime')">ANIMATION</button>
            </div>
        </div>

        <div class="control-panel">
            <div class="label">AI Studio Tools</div>
            <input type="text" id="aiPrompt" placeholder="Text-to-3D Prompt...">
            <button class="btn active" style="width:100%; margin-top:5px; background:var(--accent); color:white" onclick="generatePRO()">GENERATE ART ✨</button>
        </div>

        <div class="control-panel" id="params3D">
            <div class="label">3D Parameters</div>
            <div class="label" style="display:flex; justify-content:space-between"><span>Tension</span><span id="vTension">1.0</span></div>
            <input type="range" class="slider" min="0.1" max="5" step="0.1" value="1.0" oninput="vTension.innerText=this.value; update3DParams()">

            <div class="label" style="display:flex; justify-content:space-between"><span>Voxel Density</span><span id="vDensity">32</span></div>
            <input type="range" class="slider" min="16" max="128" step="16" value="32" oninput="vDensity.innerText=this.value; reset3DScene()">
        </div>

        <div class="control-panel" id="paramsAnim" style="display:none">
            <div class="label">Animation Timeline</div>
            <button class="btn" style="width:100%" onclick="addFrame()">+ NEW FRAME</button>
            <button class="btn" style="width:100%; margin-top:5px" onclick="playAnim()">PLAY SEQUENCE ▶️</button>
        </div>

        <div class="control-panel">
            <div class="label">Export Engine</div>
            <div class="btn-group">
                <button class="btn" onclick="exportFile('png')">PNG</button>
                <button class="btn" onclick="exportFile('obj')">OBJ</button>
                <button class="btn" onclick="exportFile('glb')">GLB</button>
                <button class="btn" onclick="exportFile('mp4')">MP4</button>
            </div>
        </div>

        <div style="margin-top:auto">
            <button class="btn" style="width:100%" onclick="location.href='index.html'">🏠 BACK TO MENU</button>
        </div>
    </div>

    <div class="viewport">
        <div class="canvas-container" id="viewContainer">
            <canvas id="threeCanvas"></canvas>
            <canvas id="drawingLayer"></canvas>
        </div>

        <div class="timeline" id="animTimeline" style="display:none">
            <div class="label">Frame Interpolation Sequence</div>
            <div class="frames" id="frameList"></div>
        </div>
    </div>

    <div id="loading">
        <h2 style="color:var(--neon)">Generating Masterpiece...</h2>
    </div>

    <script>
        let scene, camera, renderer, mesh;
        let appMode = '3d';
        let frames = [];
        let currentFrameIndex = 0;

        const dCanvas = document.getElementById('drawingLayer');
        const dCtx = dCanvas.getContext('2d');
        let isDrawing = false;

        function init() {
            initThree();
            resize();
            window.addEventListener('resize', resize);
            setupDrawing();
            animate();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threeCanvas'), antialias: true });

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            reset3DScene();
            camera.position.z = 5;
        }

        function reset3DScene() {
            if(mesh) scene.remove(mesh);
            const density = parseInt(document.getElementById('vDensity').innerText);
            const geometry = new THREE.PlaneGeometry(5, 5, density, density);
            const material = new THREE.MeshPhongMaterial({ color: 0x6c5ce7, wireframe: true, side: THREE.DoubleSide });
            mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 3;
            scene.add(mesh);
        }

        function resize() {
            const container = document.getElementById('viewContainer');
            const w = container.clientWidth;
            const h = container.clientHeight;

            if (renderer.domElement.width === w && renderer.domElement.height === h) return;

            const data = dCtx.getImageData(0, 0, dCanvas.width, dCanvas.height);

            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();

            dCanvas.width = w;
            dCanvas.height = h;
            dCtx.putImageData(data, 0, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(appMode === '3d') {
                mesh.rotation.z += 0.005;

                // Displace vertices based on "tension" or "sound"
                const time = Date.now() * 0.001;
                const tension = parseFloat(document.getElementById('vTension').innerText);
                const pos = mesh.geometry.attributes.position;
                for(let i=0; i<pos.count; i++) {
                    const x = pos.getX(i);
                    const y = pos.getY(i);
                    const z = Math.sin(x*tension + time) * Math.cos(y*tension + time) * 0.5;
                    pos.setZ(i, z);
                }
                pos.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }

        function setAppMode(m) {
            appMode = m;
            document.querySelectorAll('.sidebar .btn').forEach(b => b.classList.remove('active'));
            document.getElementById(m === '3d' ? 'mode3D' : 'modeAnim').classList.add('active');

            document.getElementById('params3D').style.display = m === '3d' ? 'flex' : 'none';
            document.getElementById('paramsAnim').style.display = m === 'anime' ? 'flex' : 'none';
            document.getElementById('animTimeline').style.display = m === 'anime' ? 'flex' : 'none';

            dCanvas.classList.toggle('active', m === 'anime');
            resize();
        }

        function setupDrawing() {
            dCanvas.onmousedown = dCanvas.ontouchstart = (e) => {
                if(appMode !== 'anime') return;
                isDrawing = true;
                const p = getPos(e);
                dCtx.beginPath();
                dCtx.moveTo(p.x, p.y);
            };
            window.onmousemove = window.ontouchmove = (e) => {
                if(!isDrawing) return;
                const p = getPos(e);
                dCtx.strokeStyle = 'white';
                dCtx.lineWidth = 2;
                dCtx.lineTo(p.x, p.y);
                dCtx.stroke();
            };
            window.onmouseup = window.ontouchend = () => isDrawing = false;
        }

        function getPos(e) {
            const rect = dCanvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        async function generatePRO() {
            const prompt = document.getElementById('aiPrompt').value;
            document.getElementById('loading').style.display = 'flex';

            // Text-to-3D Texture Generation simulation
            const seed = Math.floor(Math.random() * 9999999);
            const url = `https://image.pollinations.ai/p/${encodeURIComponent(prompt + ", procedural seamless texture, high detail 8k")}.png?width=512&height=512&seed=${seed}`;

            const loader = new THREE.TextureLoader();
            loader.load(url, (texture) => {
                mesh.material.map = texture;
                mesh.material.wireframe = false;
                mesh.material.needsUpdate = true;
                document.getElementById('loading').style.display = 'none';
            });
        }

        function addFrame() {
            const thumb = document.createElement('div');
            thumb.className = 'frame-thumb';
            thumb.innerText = `Frame ${frames.length + 1}`;
            const data = dCanvas.toDataURL();
            frames.push(data);
            document.getElementById('frameList').appendChild(thumb);
            dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
        }

        function playAnim() {
            let i = 0;
            const interval = setInterval(() => {
                if(i >= frames.length) { clearInterval(interval); return; }
                const img = new Image();
                img.src = frames[i];
                img.onload = () => {
                    dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
                    dCtx.drawImage(img, 0, 0);
                };
                i++;
            }, 200);
        }

        function exportFile(type) {
            alert(`Exporting ${type.toUpperCase()}... Implementation depends on target environment.`);
        }

        init();
    </script>
</body>
</html>

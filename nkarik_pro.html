<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nkarik PRO (18+)</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        .pro-layout { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .canvas-container { background: white; border-radius: 20px; aspect-ratio: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

        .controls-panel { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 15px; }
        .control-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 0.8rem; }

        input[type="range"] { width: 100%; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }

        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.8rem; }
        .toggle-btn.active { background: var(--arm-blue); color: white; border-color: var(--arm-blue); }

        .style-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 15px; }
        .style-item { background: white; border-radius: 8px; padding: 8px 2px; text-align: center; cursor: pointer; font-size: 0.6rem; border: 2px solid transparent; }
        .style-item.active { border-color: var(--arm-orange); background: #f0f7ff; }

        .action-btns { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        .btn-main { padding: 15px; border-radius: 30px; border: none; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; font-weight: bold; cursor: pointer; }
        .btn-sec { padding: 15px; border-radius: 30px; border: 1px solid #1a1a2e; background: white; cursor: pointer; }

        .result-view { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; items-center; justify-center; z-index: 4000; padding: 20px; }
        .res-img { max-width: 100%; max-height: 70vh; border-radius: 15px; margin-bottom: 20px; }
        .loader { color: white; margin-bottom: 20px; text-align: center; }

        .tool-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .tool-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tool-icon.active { background: var(--arm-orange); color: white; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">🏠</button>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 15px;">🎓 Nkarik PRO</h1>

        <div class="pro-layout">
            <div class="tool-bar">
                <div class="tool-icon active" onclick="setTool('brush', this)">🖌️</div>
                <div class="tool-icon" onclick="setTool('pencil', this)">✏️</div>
                <div class="tool-icon" onclick="setTool('marker', this)">🖍️</div>
                <div class="tool-icon" onclick="setTool('eraser', this)">🧽</div>
                <div class="tool-icon" onclick="clearCanvas()">🗑️</div>
            </div>

            <div class="canvas-container" id="cBox">
                <canvas id="proCanvas"></canvas>
            </div>

            <div class="controls-panel">
                <input type="text" id="promptIn" placeholder="Describe your masterpiece...">

                <div class="style-grid" id="proStyles"></div>

                <div class="control-group">
                    <div class="control-label"><span>Resolution</span><span id="resVal">512</span></div>
                    <input type="range" id="resSlider" min="256" max="1024" step="256" value="512">
                </div>

                <div class="control-group">
                    <div class="control-label"><span>CFG Scale (Guidance)</span><span id="cfgVal">7.5</span></div>
                    <input type="range" id="cfgSlider" min="1" max="20" step="0.5" value="7.5">
                </div>

                <div class="control-group">
                    <div class="control-label"><span>Seed (0 = Random)</span></div>
                    <input type="text" id="seedIn" value="0">
                </div>

                <div class="toggle-group">
                    <button class="toggle-btn" id="detailTog" onclick="this.classList.toggle('active')">High Detail</button>
                    <button class="toggle-btn" id="darkTog" onclick="this.classList.toggle('active')">Dark Mode</button>
                </div>

                <div class="action-btns">
                    <button class="btn-main" onclick="generatePro()">GENERATE ART</button>
                    <button class="btn-sec" onclick="generateVariation()">VARIATION</button>
                </div>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎓 Նկարիկ - Պրոֆեսիոնալ (18+)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        @keyframes rainbowBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%);
            background-size: 400% 400%;
            animation: rainbowBg 25s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
            color: #E0E0E0;
        }

        .app-card {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header { text-align: center; padding: 8px; }
        .header h1 { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #E94560, #FF6B6B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { font-size: 13px; color: #888; font-weight: 600; }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-label {
            font-size: 12px;
            font-weight: 700;
            color: #AAA;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
        }
        .style-btn {
            padding: 10px 4px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #CCC;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .style-btn:hover { background: rgba(255,255,255,0.1); }
        .style-btn.active {
            border-color: #E94560;
            background: rgba(233, 69, 96, 0.2);
            color: #E94560;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-row label {
            font-size: 12px;
            font-weight: 600;
            color: #AAA;
            min-width: 80px;
        }
        .slider-row input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            -webkit-appearance: none;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #E94560;
            cursor: pointer;
        }
        .slider-row span {
            font-size: 12px;
            font-weight: 700;
            color: #E94560;
            min-width: 40px;
            text-align: right;
        }

        .prompt-area {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            font-size: 14px;
            resize: none;
            height: 80px;
            outline: none;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            color: #E0E0E0;
        }
        .prompt-area:focus { border-color: #E94560; }
        .prompt-area::placeholder { color: #666; }

        .canvas-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

        .tools-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .tool-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #CCC;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.15); }
        .tool-btn.active { background: linear-gradient(135deg, #E94560, #FF6B6B); color: white; }

        .action-btns { display: flex; gap: 10px; }
        .big-btn {
            flex: 1; padding: 14px; border: none; border-radius: 18px;
            font-size: 15px; font-weight: 800; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform 0.1s;
        }
        .big-btn:active { transform: scale(0.97); }
        .big-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-generate { background: linear-gradient(135deg, #E94560, #FF6B6B); }
        .btn-variation { background: linear-gradient(135deg, #0F3460, #533483); }
        .btn-clear { background: rgba(255,255,255,0.1); }

        .loading-panel {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #E94560;
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 1s linear infinite;
        }
        .loading-text { font-size: 14px; font-weight: 700; color: #E94560; }

        .result-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.5s ease;
        }
        .result-img {
            width: 100%; aspect-ratio: 1;
            border-radius: 24px; object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .history-row { display: flex; gap: 8px; }
        .hist-btn {
            flex: 1; padding: 10px; border: none; border-radius: 12px;
            background: rgba(255,255,255,0.1); color: #CCC;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .hist-btn:hover { background: rgba(255,255,255,0.2); }
        .hist-btn.primary { background: linear-gradient(135deg, #E94560, #FF6B6B); color: white; }

        .advanced-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .option-row label {
            font-size: 13px;
            color: #AAA;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-switch.active {
            background: #E94560;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .toggle-switch.active::after {
            transform: translateX(20px);
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>🎓 Պրոֆեսիոնալ</h1>
        <div class="subtitle">Full Power AI Studio (18+)</div>
    </div>

    <div class="control-group">
        <div class="control-label">🎨 Ոճեր</div>
        <div class="style-grid" id="styleGrid"></div>
    </div>

    <div class="control-group">
        <div class="control-label">⚙️ Պարամետրեր</div>
        <div class="slider-row">
            <label>Լուծաչափ</label>
            <input type="range" id="resolution" min="256" max="1024" value="512" step="128">
            <span id="resValue">512px</span>
        </div>
        <div class="slider-row">
            <label>Seed</label>
            <input type="range" id="seedControl" min="0" max="9999999" value="0">
            <span id="seedValue">Random</span>
        </div>
        <div class="slider-row">
            <label>CFG Scale</label>
            <input type="range" id="cfgScale" min="1" max="20" value="7">
            <span id="cfgValue">7</span>
        </div>
    </div>

    <div class="control-group">
        <div class="control-label">🔧 Լրացուցիչ</div>
        <div class="advanced-options">
            <div class="option-row">
                <label>Սև ֆոն (Negative)</label>
                <div class="toggle-switch" id="negToggle" onclick="toggleOption(this)"></div>
            </div>
            <div class="option-row">
                <label>Մանրամասնություն (Detail)</label>
                <div class="toggle-switch active" id="detailToggle" onclick="toggleOption(this)"></div>
            </div>
            <div class="option-row">
                <label>Արտահանում SVG</label>
                <div class="toggle-switch" id="svgToggle" onclick="toggleOption(this)"></div>
            </div>
        </div>
    </div>

    <div class="result-view" id="resView">
        <div class="loader" id="proLoader">🔮 Weaving pixels...</div>
        <img id="proResImg" class="res-img">
        <div style="display: flex; gap: 10px;">
            <button class="btn-sec" style="flex:1" onclick="document.getElementById('resView').style.display='none'">Back</button>
            <button class="btn-main" style="flex:1" id="proDown">Download</button>
        </div>
    </div>

    <script src="shared/templates.js"></script>
    <script>
        const canvas = document.getElementById('proCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastPrompt = "";
        let currentStyle = 'realistic';
        let tool = 'brush';

        function init() {
            const size = document.getElementById('cBox').clientWidth;
            canvas.width = canvas.height = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            setTool('brush', document.querySelector('.tool-icon.active'));
            renderStyles();
        }

        function setTool(t, el) {
            tool = t;
            document.querySelectorAll('.tool-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            ctx.globalCompositeOperation = (t === 'eraser') ? 'destination-out' : 'source-over';
            if (t === 'brush') { ctx.lineWidth = 10; ctx.globalAlpha = 1; }
            else if (t === 'pencil') { ctx.lineWidth = 3; ctx.globalAlpha = 1; }
            else if (t === 'marker') { ctx.lineWidth = 15; ctx.globalAlpha = 0.4; }
            else if (t === 'eraser') { ctx.lineWidth = 20; ctx.globalAlpha = 1; }
        }

        function renderStyles() {
            const grid = document.getElementById('proStyles');
            ART_STYLES.slice(0, 18).forEach(s => {
                const item = document.createElement('div');
                item.className = `style-item ${s.id === currentStyle ? 'active' : ''}`;
                item.innerHTML = `<div>${s.label.split(' ')[1]}</div><div>${s.label.split(' ')[0]}</div>`;
                item.onclick = () => {
                    currentStyle = s.id;
                    document.querySelectorAll('.style-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                };
                grid.appendChild(item);
            });
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            if(e.type==='touchstart') e.preventDefault();
            isDrawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        };
        window.onmousemove = window.ontouchmove = (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        };
        window.onmouseup = window.ontouchend = () => isDrawing = false;

        async function generatePro() {
            const userText = document.getElementById('promptIn').value.trim();
            if (!userText) { alert('Please enter a prompt!'); return; }

            const style = ART_STYLES.find(s => s.id === currentStyle);
            const detailOn = document.getElementById('detailTog').classList.contains('active');
            const darkOn = document.getElementById('darkTog').classList.contains('active');
            const cfg = document.getElementById('cfgSlider').value;
            const res = document.getElementById('resSlider').value;
            let seed = parseInt(document.getElementById('seedIn').value);
            if (seed === 0) seed = Math.floor(Math.random() * 9999999);

            let prompt = `${userText}, ${style.prompt}`;
            if (detailOn) prompt += ', highly detailed, intricate, masterpiece, best quality';
            if (darkOn)   prompt += ', dark dramatic lighting, moody atmosphere';
            prompt += `, guidance:${cfg}`;

            lastPrompt = prompt;

            document.getElementById('resView').style.display = 'flex';
            document.getElementById('proLoader').style.display = 'block';
            document.getElementById('proResImg').src = '';

            try {
                const url = `https://image.pollinations.ai/p/${encodeURIComponent(prompt)}?width=${res}&height=${res}&seed=${seed}&nofeed=true&nologo=true`;
                const response = await fetch(url);
                const blob = await response.blob();
                const imgUrl = URL.createObjectURL(blob);

                document.getElementById('proResImg').src = imgUrl;
                document.getElementById('proLoader').style.display = 'none';
                document.getElementById('proDown').onclick = () => {
                    const a = document.createElement('a');
                    a.href = imgUrl;
                    a.download = `nkarik_pro_${seed}.png`;
                    a.click();
                };
            } catch (e) {
                alert('Generation failed. Please try again.');
                document.getElementById('resView').style.display = 'none';
            }
        }

        function generateVariation() {
            if (!lastPrompt) { alert('Generate a first image before requesting variation!'); return; }
            document.getElementById('seedIn').value = 0;
            generatePro();
        }

        document.getElementById('resSlider').oninput = (e) => document.getElementById('resVal').innerText = e.target.value;
        document.getElementById('cfgSlider').oninput = (e) => document.getElementById('cfgVal').innerText = e.target.value;

        window.onresize = () => {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            init();
            ctx.putImageData(data, 0, 0);
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Նկարիկ Դպրոցական (8-17)</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        .mode-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: white; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--arm-red); color: white; }

        .main-layout { display: flex; flex-direction: column; gap: 15px; }
        .canvas-area { background: white; border-radius: 20px; position: relative; aspect-ratio: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        #guideOverlay { position: absolute; inset: 0; pointer-events: none; opacity: 0.2; }

        .style-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .style-item { background: white; border-radius: 10px; padding: 5px; text-align: center; cursor: pointer; font-size: 0.7rem; border: 2px solid transparent; }
        .style-item.active { border-color: var(--arm-orange); background: #fff5e6; }

        .prompt-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; }

        .gen-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: linear-gradient(135deg, var(--arm-red), var(--arm-blue)); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin: 10px 0; }

        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .result-img { max-width: 100%; border-radius: 20px; box-shadow: 0 0 30px rgba(255,255,255,0.2); margin-bottom: 15px; }

        .templates { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .tmpl-card { min-width: 60px; height: 60px; background: white; border-radius: 10px; display: flex; items-center; justify-center; cursor: pointer; padding: 5px; }
        .tmpl-card svg { width: 100%; height: 100%; }

        .loading { display: none; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">🏠</button>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 10px;">🤖 ԴՊՐՈՑԱԿԱՆ</h1>

        <div class="mode-tabs">
            <button class="tab active" onclick="setMode('trace', this)">Ուրվագիծ</button>
            <button class="tab" onclick="setMode('free', this)">Ազատ</button>
            <button class="tab" onclick="setMode('prompt', this)">Պրոմփթ</button>
        </div>

        <div class="main-layout">
            <div id="templateSection">
                <div class="templates" id="tmplList"></div>
            </div>

            <div class="canvas-area" id="canvasBox">
                <canvas id="paintCanvas"></canvas>
                <div id="guideOverlay"></div>
            </div>

            <div class="style-grid" id="styleGrid"></div>

            <div class="prompt-area">
                <input type="text" id="userInput" placeholder="Ի՞նչ նկարենք...">
            </div>

            <button class="gen-btn" id="generateBtn" onclick="generateAI()">ԿԵՆԴԱՆԱՑՆԵԼ ✨</button>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="loading" id="loader">🎨 AI-ն աշխատում է...</div>
        <img id="resImg" class="result-img">
        <div style="display: flex; gap: 10px;">
            <button class="tab" onclick="closeRes()">Նորից</button>
            <button class="tab" id="downBtn" style="background: var(--arm-orange); color: white;">Պահպանել</button>
        </div>
    </div>

    <script src="shared/templates.js"></script>
    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guideOverlay');

        let mode = 'trace';
        let selectedTmpl = null;
        let selectedStyle = 'cartoon';
        let isDrawing = false;

        function init() {
            const size = document.getElementById('canvasBox').clientWidth;
            canvas.width = canvas.height = size;
            ctx.lineCap = 'round';
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#000';

            renderStyles();
            renderTmpls();
        }

        function setMode(m, el) {
            mode = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('templateSection').style.display = (m === 'trace') ? 'block' : 'none';
            document.getElementById('canvasBox').style.display = (m === 'prompt') ? 'none' : 'block';

            if (m !== 'trace') {
                selectedTmpl = null;
                guide.innerHTML = '';
            }
            clearCanvas();
        }

        function renderStyles() {
            const grid = document.getElementById('styleGrid');
            ART_STYLES.slice(0, 12).forEach(s => {
                const item = document.createElement('div');
                item.className = `style-item ${s.id === selectedStyle ? 'active' : ''}`;
                item.innerHTML = `<div>${s.label.split(' ')[1]}</div><div>${s.label.split(' ')[0]}</div>`;
                item.onclick = () => {
                    selectedStyle = s.id;
                    document.querySelectorAll('.style-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                };
                grid.appendChild(item);
            });
        }

        function renderTmpls() {
            const list = document.getElementById('tmplList');
            const allowed = GUIDED_TEMPLATES.filter(t => t.cat === 'objects' || t.cat === 'en_letters' || t.cat === 'numbers');
            allowed.forEach(t => {
                const card = document.createElement('div');
                card.className = 'tmpl-card';
                card.innerHTML = t.svg;
                card.onclick = () => {
                    selectedTmpl = t;
                    guide.innerHTML = t.svg;
                    clearCanvas();
                };
                list.appendChild(card);
            });
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            isDrawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        };
        window.onmousemove = window.ontouchmove = (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        };
        window.onmouseup = window.ontouchend = () => isDrawing = false;

        function translate(text) {
            const words = text.toLowerCase().split(' ');
            return words.map(w => DICTIONARY_MAP[w] || w).join(' ');
        }

        async function generateAI() {
            const userText = document.getElementById('userInput').value.trim();
            const styleObj = ART_STYLES.find(s => s.id === selectedStyle);

            let core = 'whimsical illustration';
            if (selectedTmpl) {
                if (selectedTmpl.cat === 'objects') core = `cute cheerful ${selectedTmpl.id}`;
                else if (selectedTmpl.cat === 'en_letters') core = `decorative artistic English letter "${selectedTmpl.label.en}" as beautiful typography`;
                else if (selectedTmpl.cat === 'numbers') core = `creative stylized number "${selectedTmpl.label.en}" as artistic numeral`;
            } else if (userText) {
                core = translate(userText);
            }

            const prompt = `${core}, ${styleObj.prompt}, child friendly illustration, high quality, clean background`;

            document.getElementById('resultOverlay').style.display = 'flex';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resImg').src = '';

            try {
                const seed = Math.floor(Math.random() * 9999999);
                const url = `https://image.pollinations.ai/p/${encodeURIComponent(prompt)}?width=512&height=512&seed=${seed}&nofeed=true&nologo=true`;

                const res = await fetch(url);
                const blob = await res.blob();
                const imgUrl = URL.createObjectURL(blob);

                document.getElementById('resImg').src = imgUrl;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('downBtn').onclick = () => {
                    const a = document.createElement('a');
                    a.href = imgUrl;
                    a.download = 'nkarik-school.png';
                    a.click();
                };
            } catch (e) {
                alert('Սխալ պատահեց: Փորձեք կրկին');
                closeRes();
            }
        }

        function closeRes() { document.getElementById('resultOverlay').style.display = 'none'; }

        window.onresize = () => {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            init();
            ctx.putImageData(data, 0, 0);
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

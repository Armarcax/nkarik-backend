<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🤖 Նկարիկ - Դպրոցական (8-17)</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        @keyframes rainbowBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #9B59B6 0%, #E74C3C 25%, #F39C12 50%, #27AE60 75%, #2980B9 100%);
            background-size: 400% 400%;
            animation: rainbowBg 20s ease infinite;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            overflow-y: auto; 
        }

        .app-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px);
            border-radius: 32px; 
            padding: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            max-width: 480px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 16px; 
        }

        .header { text-align: center; padding: 8px; }
        .header h1 { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #9B59B6, #E74C3C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { font-size: 13px; color: #888; font-weight: 600; }

        .mode-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #E5E5EA;
            border-radius: 16px;
            background: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #9B59B6, #E74C3C);
            color: white;
            border-color: transparent;
        }

        .template-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .template-btn {
            aspect-ratio: 1;
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            transition: all 0.2s;
            padding: 4px;
        }
        .template-btn:active { transform: scale(0.95); }
        .template-btn.active {
            border-color: #9B59B6;
            background: #F3E5F5;
            color: #9B59B6;
        }
        .template-btn span { font-size: 9px; font-weight: 600; color: #666; }

        .canvas-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
            overflow: hidden;
            touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

        .tools-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .tool-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: #F2F2F7;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-btn.active { background: linear-gradient(135deg, #9B59B6, #E74C3C); color: white; }

        .style-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
        }
        .style-btn {
            padding: 8px 4px;
            border: 2px solid #E5E5EA;
            border-radius: 10px;
            background: white;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .style-btn.active {
            border-color: #9B59B6;
            background: #F3E5F5;
            color: #9B59B6;
        }

        .prompt-area {
            width: 100%;
            padding: 12px;
            border: 2px solid #E5E5EA;
            border-radius: 16px;
            font-size: 14px;
            resize: none;
            height: 60px;
            outline: none;
            font-family: inherit;
        }
        .prompt-area:focus { border-color: #9B59B6; }

        .action-btns { display: flex; gap: 10px; }
        .big-btn {
            flex: 1; padding: 14px; border: none; border-radius: 18px;
            font-size: 16px; font-weight: 800; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform 0.1s;
        }
        .big-btn:active { transform: scale(0.97); }
        .big-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-generate { background: linear-gradient(135deg, #9B59B6, #E74C3C); }
        .btn-video { background: linear-gradient(135deg, #2980B9, #27AE60); }
        .btn-clear { background: linear-gradient(135deg, #7F8C8D, #95A5A6); }

        .loading-panel {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #E5E5EA;
            border-top-color: #9B59B6;
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 1s linear infinite;
        }
        .loading-text { font-size: 14px; font-weight: 700; color: #9B59B6; }

        .result-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.5s ease;
        }
        .result-img {
            width: 100%; aspect-ratio: 1;
            border-radius: 24px; object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .result-img.animate {
            animation: dynamicPan 4s infinite ease-in-out;
        }
        @keyframes dynamicPan {
            0% { transform: scale(1); }
            50% { transform: scale(1.15) translate(-5px, -5px); }
            100% { transform: scale(1); }
        }

        .history-row { display: flex; gap: 8px; }
        .hist-btn {
            flex: 1; padding: 10px; border: none; border-radius: 12px;
            background: #E5E5EA; font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .hist-btn.primary { background: #9B59B6; color: white; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>🤖 Դպրոցական</h1>
        <div class="subtitle">AI + Բանականություն (8-17 տ.)</div>
    </div>

    <div class="mode-tabs">
        <button class="mode-btn active" onclick="setMode('trace')">✏️ Ուրվագծել</button>
        <button class="mode-btn" onclick="setMode('free')">🎨 Ազատ</button>
        <button class="mode-btn" onclick="setMode('prompt')">💭 Պրոմպթ</button>
    </div>

    <div class="template-section" id="templateSection">
        <div class="section-label">Ուրվագծեր</div>
        <div class="template-grid" id="templateGrid"></div>
    </div>

    <div class="canvas-area" id="canvasArea">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="tools-row" id="toolsRow">
        <button class="tool-btn active" onclick="setTool('pencil')">✏️ Մատիտ</button>
        <button class="tool-btn" onclick="setTool('brush')">🖌️ Վրձին</button>
        <button class="tool-btn" onclick="setTool('eraser')">🧼 Ռետին</button>
    </div>

    <div class="style-section" id="styleSection">
        <div class="section-label">🎨 Ոճեր</div>
        <div class="style-grid" id="styleGrid"></div>
    </div>

    <textarea class="prompt-area" id="promptInput" placeholder="Գրիր այստեղ, թե ինչ ես ուզում նկարել... (կամ ընտրիր ուրվագիծ վերևից)"></textarea>

    <div class="action-btns">
        <button class="big-btn btn-generate" id="generateBtn" onclick="generateAI()">🚀 Նկարել</button>
        <button class="big-btn btn-video" id="videoBtn" onclick="generateAI(true)">🎬 Անիմացիա</button>
    </div>

    <div class="loading-panel" id="loadingPanel">
        <div class="spinner"></div>
        <div class="loading-text">AI-ը մտածում է... 🤔</div>
    </div>

    <div class="result-panel" id="resultPanel">
        <img class="result-img" id="resultImg" alt="AI Generated">
        <div class="history-row">
            <button class="hist-btn primary" onclick="downloadResult()">💾 Ներբեռնել</button>
            <button class="hist-btn" onclick="newGeneration()">✨ Նորը</button>
        </div>
    </div>
</div>

<script>
// ============================================
// ԴՊՐՈՑԱԿԱՆ (8-17) - Pollinations AI
// ============================================

const SCHOOL_TEMPLATES = {
    letters: [
        { id: 'en_a', char: 'A', prompt: 'English alphabet letter A' },
        { id: 'en_b', char: 'B', prompt: 'English alphabet letter B' },
        { id: 'en_c', char: 'C', prompt: 'English alphabet letter C' },
        { id: 'en_d', char: 'D', prompt: 'English alphabet letter D' },
        { id: 'en_e', char: 'E', prompt: 'English alphabet letter E' },
        { id: 'en_f', char: 'F', prompt: 'English alphabet letter F' },
        { id: 'en_g', char: 'G', prompt: 'English alphabet letter G' },
        { id: 'en_h', char: 'H', prompt: 'English alphabet letter H' },
    ],
    numbers: [
        { id: 'num_0', char: '0', prompt: 'stylized number zero' },
        { id: 'num_1', char: '1', prompt: 'stylized number one' },
        { id: 'num_2', char: '2', prompt: 'stylized number two' },
        { id: 'num_3', char: '3', prompt: 'stylized number three' },
        { id: 'num_4', char: '4', prompt: 'stylized number four' },
        { id: 'num_5', char: '5', prompt: 'stylized number five' },
        { id: 'num_6', char: '6', prompt: 'stylized number six' },
        { id: 'num_7', char: '7', prompt: 'stylized number seven' },
    ],
    objects: [
        { id: 'obj_dragon', char: '🐉', prompt: 'cute friendly dragon' },
        { id: 'obj_unicorn', char: '🦄', prompt: 'cute magical unicorn' },
        { id: 'obj_castle', char: '🏰', prompt: 'fantasy castle' },
        { id: 'obj_spaceship', char: '🚀', prompt: 'futuristic spaceship' },
        { id: 'obj_robot', char: '🤖', prompt: 'friendly robot' },
        { id: 'obj_dinosaur', char: '🦕', prompt: 'cute dinosaur' },
        { id: 'obj_pirate', char: '🏴‍☠️', prompt: 'cartoon pirate ship' },
        { id: 'obj_fairy', char: '🧚', prompt: 'magical fairy' },
    ]
};

const ART_STYLES = [
    { id: 'cartoon', label: 'Cartoon 🧸', prompt: 'cute cheerful cartoon style simple lines bright colors' },
    { id: 'anime', label: 'Anime ⚡', prompt: 'studio ghibli style anime cheerful fantasy artwork' },
    { id: 'pixel', label: 'Pixel 👾', prompt: 'retro 8bit clean pixel art flat vibrant colors' },
    { id: 'watercolor', label: 'Watercolor 🎨', prompt: 'soft pastel watercolor painting illustration' },
    { id: 'cyberpunk', label: 'Cyberpunk 🌆', prompt: 'bright futuristic colorful sci-fi neon style' },
    { id: 'oil', label: 'Oil Paint 🖼️', prompt: 'vibrant texturized impasto oil painting artwork' },
    { id: 'sketch', label: 'Sketch 📝', prompt: 'detailed pencil drawing contour line sketch art' },
    { id: 'popart', label: 'Pop Art 🍿', prompt: 'bold pop art comic style lines halftone textures' },
    { id: 'origami', label: 'Origami 📐', prompt: 'beautifully folded complex origami papercraft' },
    { id: 'lowpoly', label: 'Low Poly 💎', prompt: 'modern geometric low-poly 3D render vibrant' },
    { id: 'neon', label: 'Neon Glow 🎆', prompt: 'luminescent neon line wireframe over dark background' },
    { id: 'graffiti', label: 'Graffiti 📻', prompt: 'urban street graffiti wildstyle spray paint murals' },
];

let currentMode = 'trace';
let currentCategory = 'letters';
let currentTemplate = null;
let currentStyle = 'cartoon';
let currentTool = 'pencil';
let currentColor = '#9B59B6';
let isDrawing = false;
let isProcessing = false;

const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
    const rect = document.getElementById('canvasArea').getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    const templateSection = document.getElementById('templateSection');
    const toolsRow = document.getElementById('toolsRow');

    if (mode === 'prompt') {
        templateSection.style.display = 'none';
        toolsRow.style.display = 'none';
    } else {
        templateSection.style.display = 'flex';
        toolsRow.style.display = 'flex';
    }
}

function renderTemplates() {
    const grid = document.getElementById('templateGrid');
    grid.innerHTML = '';

    const items = SCHOOL_TEMPLATES[currentCategory];
    items.forEach(tmpl => {
        const btn = document.createElement('div');
        btn.className = 'template-btn';
        btn.innerHTML = `${tmpl.char}<span>${tmpl.char}</span>`;
        btn.onclick = () => selectTemplate(tmpl, btn);
        grid.appendChild(btn);
    });
}

function selectTemplate(tmpl, element) {
    currentTemplate = tmpl;
    document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
    element.classList.add('active');

    document.getElementById('promptInput').value = '';
}

function renderStyles() {
    const grid = document.getElementById('styleGrid');
    grid.innerHTML = '';

    ART_STYLES.forEach(style => {
        const btn = document.createElement('div');
        btn.className = `style-btn ${style.id === currentStyle ? 'active' : ''}`;
        btn.innerText = style.label;
        btn.onclick = () => {
            currentStyle = style.id;
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        grid.appendChild(btn);
    });
}

function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(e) {
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
    if (!isDrawing) return;
    const pos = getPos(e);

    if (currentTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 20;
    } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentTool === 'brush' ? 8 : 4;
    }

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

function stopDraw() {
    isDrawing = false;
    ctx.beginPath();
    ctx.globalCompositeOperation = 'source-over';
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function buildPrompt() {
    const userText = document.getElementById('promptInput').value.trim();
    const styleObj = ART_STYLES.find(s => s.id === currentStyle) || ART_STYLES[0];

    let prompt = '';

    if (currentMode === 'prompt' && userText) {
        // Free prompt mode
        prompt = `cute cheerful ${userText}, ${styleObj.prompt}, child friendly illustration, high quality`;
    } 
    else if (currentTemplate) {
        // Template mode
        prompt = `cute ${currentTemplate.prompt}, ${styleObj.prompt}, child friendly illustration, high quality, clean background`;

        if (userText) {
            prompt += `, ${userText}`;
        }
    } 
    else {
        prompt = `cute cheerful doodle art, ${styleObj.prompt}, child friendly illustration`;
    }

    return prompt;
}

async function generateAI(isVideo = false) {
    if (isProcessing) return;

    const prompt = buildPrompt();
    if (!prompt) {
        alert('Գրիր պրոմպթ կամ ընտրիր ուրվագիծ!');
        return;
    }

    isProcessing = true;
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('videoBtn').disabled = true;
    document.getElementById('loadingPanel').style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';

    try {
        const encodedPrompt = encodeURIComponent(prompt);
        const seed = Math.floor(Math.random() * 9999999);
        const url = `https://image.pollinations.ai/p/${encodedPrompt}?width=512&height=512&seed=${seed}&nofeed=true`;

        const response = await fetch(url);
        if (!response.ok) throw new Error('Network error');

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        const resultImg = document.getElementById('resultImg');
        resultImg.src = imageUrl;

        if (isVideo) {
            resultImg.classList.add('animate');
        } else {
            resultImg.classList.remove('animate');
        }

        document.getElementById('resultPanel').style.display = 'flex';

    } catch (err) {
        alert('Սխալ: ' + err.message + '. Փորձիր կրկին!');
    } finally {
        isProcessing = false;
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('videoBtn').disabled = false;
        document.getElementById('loadingPanel').style.display = 'none';
    }
}

function downloadResult() {
    const link = document.createElement('a');
    link.download = `nkarik-school-${Date.now()}.png`;
    link.href = document.getElementById('resultImg').src;
    link.click();
}

function newGeneration() {
    document.getElementById('resultPanel').style.display = 'none';
    clearCanvas();
    document.getElementById('promptInput').value = '';
}

// Events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseout', stopDraw);

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', stopDraw);

window.addEventListener('resize', setupCanvas);

// Init
setTimeout(() => {
    setupCanvas();
    renderTemplates();
    renderStyles();
}, 100);
</script>
</body>
</html>
